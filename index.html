<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phyto Studio — Content & Catalogue Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs/dist/pptxgen.bundle.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ── Themes ── */
:root{
  --bg:#0f1117;--surface:#181c25;--surface2:#1e2330;--border:#272d3d;
  --text:#e8eaf0;--muted:#6b7280;--muted2:#9ca3af;--input-bg:#0f1117;
  --card-shadow:0 4px 16px rgba(0,0,0,0.35);
  --phytolabs:#1a535c;--tcplants:#52796f;--cp:#2d6a4f;--radius:8px;
}
[data-theme="light"]{
  --bg:#f1f5f9;--surface:#ffffff;--surface2:#f8fafc;--border:#e2e8f0;
  --text:#1e293b;--muted:#64748b;--muted2:#475569;--input-bg:#ffffff;
  --card-shadow:0 2px 8px rgba(0,0,0,0.08);
}
[data-theme="paper"]{
  --bg:#f5f0e8;--surface:#faf8f4;--surface2:#ede8dc;--border:#c9c2b4;
  --text:#2c2416;--muted:#7c7165;--muted2:#5c5248;--input-bg:#faf8f4;
  --card-shadow:0 2px 8px rgba(44,36,22,0.1);
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;transition:background 0.2s,color 0.2s;}
input,textarea,select,button{font-family:inherit;font-size:inherit;color:var(--text);}
button{cursor:pointer;border:none;background:none;}
a{color:inherit;text-decoration:none;}
::placeholder{color:var(--muted);}
:focus-visible{outline:2px solid var(--phytolabs);outline-offset:2px;}

/* ── Auth gate ── */
#auth-gate{display:flex;min-height:100vh;background:var(--bg);}
.auth-left{flex:1;display:flex;align-items:center;justify-content:center;padding:3em;background:var(--surface);border-right:1px solid var(--border);}
.auth-right{flex:1;display:flex;flex-direction:column;justify-content:center;padding:3em 4em;}
.auth-brand{margin-bottom:2.5em;}
.auth-wordmark{font-family:'Cormorant Garamond',serif;font-size:2.2em;font-weight:700;color:var(--text);letter-spacing:-0.02em;}
.auth-wordmark span{color:var(--phytolabs);}
.auth-tagline{color:var(--muted);font-size:0.88em;margin-top:0.3em;}
.auth-sites{display:flex;flex-direction:column;gap:0.9em;}
.auth-site{display:flex;align-items:center;gap:1em;padding:1em 1.2em;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);}
.auth-site-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.auth-site-name{font-weight:700;font-size:0.88em;}
.auth-site-desc{font-size:0.78em;color:var(--muted);margin-top:0.1em;}
.auth-form-title{font-family:'Cormorant Garamond',serif;font-size:1.6em;font-weight:600;margin-bottom:0.3em;}
.auth-form-sub{color:var(--muted);font-size:0.85em;margin-bottom:1.8em;line-height:1.6;}
.auth-input-wrap{position:relative;margin-bottom:0.8em;}
.auth-input-wrap input{width:100%;padding:0.75em 1em;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);font-size:0.95em;transition:border-color 0.15s;}
.auth-input-wrap input:focus{border-color:var(--phytolabs);outline:none;}
.auth-hint{font-size:0.78em;color:var(--muted);line-height:1.65;margin-top:1em;}
.auth-hint a{color:var(--muted2);text-decoration:underline;}
@media(max-width:700px){.auth-left{display:none;}.auth-right{padding:2em;}}

/* ── App shell ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── Header ── */
.studio-header{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.8em;padding:0 1.4em;height:52px;flex-shrink:0;}
.studio-logo{font-family:'Cormorant Garamond',serif;font-size:1.2em;font-weight:700;white-space:nowrap;cursor:pointer;padding:0.3em 0.5em;border-radius:6px;transition:background 0.15s;}
.studio-logo:hover{background:var(--surface2);}
.studio-logo span{color:var(--phytolabs);}
.brand-pills{display:flex;gap:0.35em;flex:1;}
.brand-pill{padding:0.28em 0.85em;border-radius:20px;font-size:0.77em;font-weight:700;border:1.5px solid transparent;color:var(--muted);transition:all 0.15s;}
.brand-pill:hover{color:var(--text);}
.brand-pill.active[data-brand=phytolabs]{background:rgba(26,83,92,0.18);border-color:var(--phytolabs);color:#62b6c1;}
.brand-pill.active[data-brand=tcplants]{background:rgba(82,121,111,0.18);border-color:var(--tcplants);color:#84a98c;}
.brand-pill.active[data-brand=carnivorousplants]{background:rgba(45,106,79,0.18);border-color:var(--cp);color:#95d5b2;}
.header-right{display:flex;gap:0.4em;align-items:center;margin-left:auto;}
.icon-btn{color:var(--muted);padding:0.4em 0.5em;border-radius:6px;font-size:1em;transition:color 0.15s,background 0.15s;line-height:1;}
.icon-btn:hover{color:var(--text);background:var(--surface2);}
.theme-label{font-size:0.7em;color:var(--muted);margin-left:0.2em;vertical-align:middle;}

/* ── Main ── */
.studio-main{flex:1;overflow-y:auto;padding:1.8em 2em;}

/* ── List view ── */
.list-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5em;flex-wrap:wrap;gap:0.8em;}
.list-toolbar h2{font-family:'Cormorant Garamond',serif;font-size:1.5em;font-weight:600;}
.toolbar-right{display:flex;gap:0.6em;align-items:center;}
.select-sm{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:0.35em 0.7em;font-size:0.82em;}

/* ── Cards ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2em;}
.pres-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color 0.15s,box-shadow 0.15s;}
.pres-card:hover{border-color:var(--muted);box-shadow:var(--card-shadow);}
.card-top{height:4px;}
.card-top.phytolabs{background:var(--phytolabs);}
.card-top.tcplants{background:var(--tcplants);}
.card-top.carnivorousplants{background:var(--cp);}
.card-body{padding:1.1em 1.2em 0.8em;}
.card-brand-label{font-size:0.7em;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.5em;}
.card-brand-label.phytolabs{color:var(--phytolabs);}
.card-brand-label.tcplants{color:var(--tcplants);}
.card-brand-label.carnivorousplants{color:var(--cp);}
.card-title{font-family:'Cormorant Garamond',serif;font-size:1.1em;font-weight:600;line-height:1.3;margin-bottom:0.4em;}
.card-desc{font-size:0.8em;color:var(--muted);line-height:1.5;}
.card-footer{padding:0.7em 1.2em;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:0.5em;flex-wrap:wrap;}
.card-meta{font-size:0.75em;color:var(--muted);display:flex;gap:0.7em;flex-wrap:wrap;align-items:center;}
.card-actions{display:flex;gap:0.4em;}
.btn-xs{font-size:0.75em;padding:0.3em 0.7em;border-radius:5px;font-weight:600;transition:background 0.15s;}
.btn-edit{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-edit:hover{background:var(--border);}
.btn-view{color:#fff;border:none;}
.btn-view.phytolabs{background:var(--phytolabs);}
.btn-view.tcplants{background:var(--tcplants);}
.btn-view.carnivorousplants{background:var(--cp);}
.status-badge{display:inline-flex;align-items:center;gap:0.3em;font-size:0.68em;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:0.2em 0.6em;border-radius:4px;}
.badge-live{background:rgba(74,222,128,0.15);color:#4ade80;}
.badge-scheduled{background:rgba(96,165,250,0.15);color:#60a5fa;}
.badge-draft{background:rgba(251,191,36,0.15);color:#fbbf24;}
.badge-archived{background:rgba(107,114,128,0.15);color:var(--muted);}
.badge-expired{background:rgba(239,68,68,0.15);color:#f87171;}
.badge-hidden{background:rgba(107,114,128,0.15);color:var(--muted);}

/* ── Editor ── */
.editor-wrap{display:flex;height:calc(100vh - 52px);overflow:hidden;}
.slide-sidebar{width:195px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:0.8em 1em;border-bottom:1px solid var(--border);font-size:0.75em;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);}
.slide-list{flex:1;overflow-y:auto;padding:0.4em;}
.slide-item{padding:0.5em 0.65em;border-radius:6px;cursor:pointer;font-size:0.8em;display:flex;align-items:center;gap:0.35em;color:var(--muted2);margin-bottom:1px;user-select:none;}
.slide-item:hover{background:var(--surface2);color:var(--text);}
.slide-item.active{background:var(--surface2);color:var(--text);font-weight:600;}
.slide-num{font-size:0.72em;color:var(--muted);min-width:1.3em;flex-shrink:0;}
.slide-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.slide-acts{display:flex;gap:1px;opacity:0;transition:opacity 0.1s;flex-shrink:0;}
.slide-item:hover .slide-acts{opacity:1;}
.slide-act-btn{color:var(--muted);padding:2px 4px;border-radius:3px;font-size:0.85em;line-height:1;}
.slide-act-btn:hover{background:var(--border);color:var(--text);}
.slide-act-btn.del:hover{background:rgba(239,68,68,0.15);color:#f87171;}
.sidebar-add{padding:0.7em 0.9em;border-top:1px solid var(--border);}
.btn-add-slide{width:100%;background:var(--surface2);border:1px dashed var(--border);border-radius:6px;padding:0.5em;color:var(--muted);font-size:0.8em;transition:all 0.15s;}
.btn-add-slide:hover{border-color:var(--muted);color:var(--text);}

.editor-main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0;}
.editor-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.2em;height:52px;display:flex;align-items:center;gap:0.8em;flex-shrink:0;}
.editor-back{color:var(--muted);font-size:0.82em;display:flex;align-items:center;gap:0.3em;padding:0.35em 0.6em;border-radius:6px;transition:background 0.15s,color 0.15s;}
.editor-back:hover{color:var(--text);background:var(--surface2);}
.editor-title{font-family:'Cormorant Garamond',serif;font-size:1.05em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.editor-actions{display:flex;gap:0.4em;align-items:center;flex-shrink:0;}
.btn-primary{background:var(--phytolabs);color:#fff;padding:0.4em 1em;border-radius:6px;font-size:0.82em;font-weight:700;transition:opacity 0.15s;border:none;}
.btn-primary:hover:not(:disabled){opacity:0.85;}
.btn-primary:disabled{opacity:0.45;cursor:not-allowed;}
.btn-secondary{background:var(--surface2);color:var(--text);padding:0.4em 0.9em;border-radius:6px;font-size:0.82em;font-weight:600;border:1px solid var(--border);transition:background 0.15s;}
.btn-secondary:hover:not(:disabled){background:var(--border);}
.btn-secondary:disabled{opacity:0.45;cursor:not-allowed;}

.editor-content{padding:1.4em 1.6em;flex:1;overflow-y:auto;}
.slide-form{max-width:640px;}
.form-row{margin-bottom:1em;}
.form-row label{display:block;font-size:0.76em;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.35em;}
.form-row input,.form-row textarea,.form-row select{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:0.58em 0.8em;color:var(--text);transition:border-color 0.15s;}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{border-color:var(--phytolabs);outline:none;}
.form-row textarea{resize:vertical;min-height:68px;}
.form-row select{background:var(--input-bg);}
.form-row .hint{font-size:0.75em;color:var(--muted);margin-top:0.25em;}
.bullet-row{display:flex;gap:0.35em;margin-bottom:0.35em;}
.bullet-row input{flex:1;}
.btn-remove{color:var(--muted);padding:0.4em;border-radius:4px;font-size:1em;line-height:1;transition:color 0.15s,background 0.15s;}
.btn-remove:hover{color:#f87171;background:rgba(239,68,68,0.1);}
.btn-add-bullet{font-size:0.77em;color:var(--muted);padding:0.3em 0;display:inline-flex;align-items:center;gap:0.3em;margin-top:0.2em;transition:color 0.15s;}
.btn-add-bullet:hover{color:var(--text);}
.ai-row{display:flex;gap:0.5em;align-items:center;margin-top:1.2em;padding-top:1.2em;border-top:1px solid var(--border);flex-wrap:wrap;}
.ai-label{font-size:0.77em;color:var(--muted);flex:1;min-width:100px;}
.btn-ai{font-size:0.77em;padding:0.4em 0.85em;border-radius:6px;font-weight:600;border:1px solid var(--border);color:var(--text);background:var(--surface2);display:inline-flex;align-items:center;gap:0.3em;transition:all 0.15s;}
.btn-ai:hover:not(:disabled){border-color:var(--muted);background:var(--border);}
.btn-ai:disabled{opacity:0.4;cursor:not-allowed;}

/* ── Slide preview ── */
.slide-preview{margin-top:1.4em;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.preview-label{padding:0.45em 0.8em;font-size:0.7em;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border);}
.preview-frame{background:#fff;aspect-ratio:16/9;position:relative;overflow:hidden;font-size:10px;}
.pf-cover{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1em 2em;}
.pf-cover h1{font-family:'Cormorant Garamond',serif;font-size:2.4em;font-weight:700;color:#fff;text-align:center;line-height:1.2;}
.pf-cover p{color:rgba(255,255,255,0.65);margin-top:0.5em;font-size:1.1em;text-align:center;}
.pf-text{padding:1.5em;}
.pf-text h2{font-family:'Cormorant Garamond',serif;font-size:1.8em;font-weight:600;margin-bottom:0.5em;}
.pf-text p{font-size:0.92em;color:#444;line-height:1.5;margin-bottom:0.5em;}
.pf-text ul{padding-left:1.2em;}
.pf-text li{font-size:0.88em;color:#333;margin-bottom:0.2em;}
.pf-imgtext{display:grid;grid-template-columns:1fr 1fr;height:100%;}
.pf-img-side{background:#e5e7eb;display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:1.2em;overflow:hidden;}
.pf-img-side img{width:100%;height:100%;object-fit:cover;}
.pf-text-side{padding:1.2em;}
.pf-grid{padding:1em;}
.pf-grid h2{font-family:'Cormorant Garamond',serif;font-size:1.5em;margin-bottom:0.5em;}
.pf-products{display:grid;grid-template-columns:1fr 1fr;gap:0.4em;}
.pf-product{border-radius:4px;padding:0.5em 0.6em;border-left:3px solid;}
.pf-product .pn{font-size:0.85em;font-weight:600;}
.pf-product .pp{font-size:0.78em;font-weight:700;margin-top:0.1em;}
.pf-contact{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5em;}
.pf-contact h2{font-family:'Cormorant Garamond',serif;font-size:1.8em;color:#fff;margin-bottom:0.6em;}
.pf-contact p{color:rgba(255,255,255,0.8);font-size:0.9em;line-height:2;text-align:center;}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1em;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:1.1em 1.4em;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-header h3{font-family:'Cormorant Garamond',serif;font-size:1.2em;font-weight:600;}
.modal-body{padding:1.4em;}
.modal-footer{padding:1em 1.4em;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:0.6em;flex-wrap:wrap;}
.layout-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.7em;}
.layout-opt{background:var(--surface2);border:2px solid var(--border);border-radius:8px;padding:0.9em;cursor:pointer;text-align:center;transition:all 0.15s;}
.layout-opt:hover{border-color:var(--phytolabs);}
.layout-opt .licon{font-size:1.6em;margin-bottom:0.3em;}
.layout-opt .lname{font-size:0.82em;font-weight:600;}
.layout-opt .ldesc{font-size:0.72em;color:var(--muted);margin-top:0.1em;}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:0.8em;}

/* ── Settings ── */
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.4em;margin-bottom:1.2em;}
.settings-section h3{font-family:'Cormorant Garamond',serif;font-size:1.1em;margin-bottom:1em;}
.settings-hint{font-size:0.78em;color:var(--muted);line-height:1.7;margin-top:0.8em;}
.settings-hint code{background:var(--surface2);padding:0.1em 0.4em;border-radius:3px;font-family:monospace;font-size:0.88em;}

/* ── Toast ── */
.toast{position:fixed;bottom:1.5em;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.65em 1.3em;font-size:0.84em;box-shadow:0 4px 20px rgba(0,0,0,0.3);z-index:2000;white-space:nowrap;pointer-events:none;}
.toast.success{border-color:#4ade80;color:#4ade80;}
.toast.error{border-color:#f87171;color:#f87171;}
.toast.info{border-color:var(--muted);color:var(--muted2);}

/* ── Misc ── */
.dirty-dot{width:7px;height:7px;border-radius:50%;background:#fbbf24;display:inline-block;margin-left:0.4em;vertical-align:middle;flex-shrink:0;}
.empty-state{text-align:center;padding:4em 2em;color:var(--muted);}
.empty-state h3{font-family:'Cormorant Garamond',serif;font-size:1.4em;color:var(--text);margin-bottom:0.5em;}
.spinner{display:inline-block;width:0.9em;height:0.9em;border:2px solid var(--border);border-top-color:var(--muted);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.slug-row{display:flex;align-items:center;gap:0.5em;}
.slug-prefix{font-size:0.78em;color:var(--muted);white-space:nowrap;font-family:monospace;}
.vis-row{display:grid;grid-template-columns:1fr 1fr;gap:0.8em;}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const REPO = 'shiva16/phyto-studio';
const GH_API = 'https://api.github.com';
const GH_PAGES = 'https://shiva16.github.io/phyto-studio';
const THEMES = ['dark','light','paper'];

const BRANDS = {
  phytolabs:{ label:'Phyto Labs', site:'phytolabs.in', color:'#1a535c', dark:'#0d2b30', light:'#62b6c1', pale:'#e8f4f6',
    ctx:'plant science laboratory offering TC media (MS Medium, BAP, NAA, GA3, IBA, TC Agar), protocol development, lab consultation, lab setup and software for researchers and agri-businesses in India' },
  tcplants:{ label:'TC Plants', site:'tcplants.in', color:'#52796f', dark:'#2f3e46', light:'#84a98c', pale:'#edf3ef',
    ctx:'tissue culture nursery producing lab-grown disease-free plants (Nepenthes, banana TC, Venus Fly Trap) for commercial and retail customers across India' },
  carnivorousplants:{ label:'Carnivorous Plants', site:'carnivorousplants.in', color:'#2d6a4f', dark:'#1b4332', light:'#95d5b2', pale:'#edf7f1',
    ctx:"India's exclusive carnivorous plant retailer selling Nepenthes, Sarracenia, Dionaea, Drosera, Cephalotus, Pinguicula to collectors and hobbyists" }
};

const LAYOUTS = {
  cover:        { label:'Cover',          icon:'🎯', desc:'Title slide' },
  'text-only':  { label:'Text & Bullets', icon:'📝', desc:'Heading + bullets' },
  'image-text': { label:'Image + Text',   icon:'🖼️', desc:'Split layout' },
  'product-grid':{ label:'Product Grid',  icon:'🛒', desc:'4 product cards' },
  contact:      { label:'Contact',        icon:'📬', desc:'CTA / contact' },
};

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let S = {
  pat: sessionStorage.getItem('ps_pat') || '',
  workerUrl: localStorage.getItem('ps_worker') || '',
  brand: 'phytolabs',
  view: 'list',
  presentations: [],
  catalogueSha: '',
  current: null,
  slides: [],
  presentationSha: '',

// GITHUB API
// ═══════════════════════════════════════════════════════
async function ghGet(path) {
  const r = await fetch(`${GH_API}/repos/${REPO}/contents/${path}`,
    { headers:{ Authorization:`Bearer ${S.pat}`, Accept:'application/vnd.github.v3+json' } });
  if (!r.ok){ if(r.status===404) return null; throw new Error(`GitHub ${r.status}: ${await r.text()}`); }
  return r.json();
}
async function ghPut(path, content, message, sha) {
  const body = { message, content: btoa(unescape(encodeURIComponent(content))) };
  if (sha) body.sha = sha;
  const r = await fetch(`${GH_API}/repos/${REPO}/contents/${path}`, {
    method:'PUT',
    headers:{ Authorization:`Bearer ${S.pat}`, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`GitHub ${r.status}: ${await r.text()}`);
  return r.json();
}
function ghDecode(f){ return decodeURIComponent(escape(atob(f.content.replace(/\s/g,'')))); }

async function loadCatalogue() {
  const f = await ghGet('data/catalogue.json');
  if (!f){ S.presentations=[]; S.catalogueSha=''; return; }
  const d = JSON.parse(ghDecode(f));
  S.presentations = d.presentations || [];
  S.catalogueSha = f.sha;
}
async function saveCatalogue() {
  const res = await ghPut('data/catalogue.json', JSON.stringify({presentations:S.presentations},null,2), 'Update catalogue index', S.catalogueSha);
  S.catalogueSha = res.content.sha;
}
async function loadPresentation(slug) {
  const f = await ghGet(`data/presentations/${slug}.json`);
  if (!f){ S.slides=[defaultSlide('cover')]; S.presentationSha=''; return; }
  const d = JSON.parse(ghDecode(f));
  S.slides = d.slides || [defaultSlide('cover')];
  S.presentationSha = f.sha;
}
async function savePresentation() {
  const res = await ghPut(`data/presentations/${S.current.slug}.json`,
    JSON.stringify({slides:S.slides},null,2), `Save ${S.current.slug}`, S.presentationSha||undefined);
  S.presentationSha = res.content.sha;
}

// AI

async function aiCall(messages, model='fast') {
  if (!S.workerUrl) throw new Error('AI Worker URL not set. Add it in Settings.');
  const r = await fetch(`${S.workerUrl.replace(/\/$/,'')}/generate`,{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({messages, model})
  });
  if (!r.ok) throw new Error(`Worker ${r.status}`);
  const data = await r.json();
  const text = data.choices?.[0]?.message?.content;
  if (!text) throw new Error('Empty AI response');
  return JSON.parse(text);
}

async function generateFullDeck(brief, brand) {
  const b = BRANDS[brand];
  return aiCall([

cover: {title,subtitle}; text-only: {heading,body,bullets:[]}; image-text: {heading,image:"",bullets:[]}; product-grid: {heading,products:[{name,price,desc}×4]}; contact: {heading,email:"info@${b.site}",phone:"",website:"${b.site}",address:"Thaiyur, OMR, Chennai"}
Make 5-8 slides starting with cover, ending with contact. Professional and specific to ${b.label}.` }

function defaultSlide(layout) {
  const defaults = {
    cover:         {title:'',subtitle:''},
    'text-only':   {heading:'',body:'',bullets:['','']},
    'image-text':  {heading:'',image:'',bullets:['','']},
    'product-grid':{heading:'Products',products:[{name:'',price:'',desc:''},{name:'',price:'',desc:''},{name:'',price:'',desc:''},{name:'',price:'',desc:''}]},
    contact:       {heading:'Get in Touch',email:'',phone:'',website:'',address:''},
  };
  return { id: crypto.randomUUID(), layout, data: JSON.parse(JSON.stringify(defaults[layout]||{})) };
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function slugify(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,60)||'untitled'; }

function nowIST(){
  const now = new Date();
  const ist = new Date(now.getTime() + (5.5*60*60*1000));
  return ist.toISOString().slice(0,16);
}

function statusInfo(p) {
  const now = new Date();
  if (p.status === 'archived') return { label:'Archived', cls:'badge-archived' };
  if (p.status === 'draft')    return { label:'Draft',    cls:'badge-draft' };
  if (p.expires && new Date(p.expires) < now) return { label:'Expired', cls:'badge-expired' };
  if (p.visible_from && new Date(p.visible_from) > now) return { label:'Scheduled', cls:'badge-scheduled' };
  if (p.status === 'published') return { label:'Live', cls:'badge-live' };
  return { label:'Hidden', cls:'badge-hidden' };
}

function isPubliclyVisible(p) {
  const now = new Date();
  return p.status === 'published'
    && (!p.expires || new Date(p.expires) > now)
    && (!p.visible_from || new Date(p.visible_from) <= now);
}

// ═══════════════════════════════════════════════════════
// PPTX EXPORT
// ═══════════════════════════════════════════════════════
async function downloadPPTX(meta, slides) {
  const pptx = new PptxGenJS();
  pptx.layout = 'LAYOUT_WIDE'; pptx.title = meta.title;
  const b = BRANDS[meta.brand];
  const bH = b.color.replace('#',''), dH = b.dark.replace('#','');

  for (const slide of slides) {
    const s = pptx.addSlide();
    const d = slide.data;
    switch(slide.layout) {
      case 'cover':
        s.background = {color:dH};
        s.addText(b.label.toUpperCase(), {x:.5,y:.8,w:9,h:.5,fontSize:10,color:'AAAAAA',align:'center',charSpacing:3});
        s.addText(d.title||'', {x:.5,y:1.6,w:9,h:1.8,fontSize:40,bold:true,color:'FFFFFF',align:'center',fontFace:'Georgia'});
        s.addText(d.subtitle||'', {x:.5,y:3.5,w:9,h:.8,fontSize:20,color:'BBBBBB',align:'center'});
        break;
      case 'text-only':
        s.addText(d.heading||'', {x:.5,y:.4,w:9,h:.9,fontSize:28,bold:true,color:dH,fontFace:'Georgia'});
        if (d.body) s.addText(d.body, {x:.5,y:1.4,w:9,h:.9,fontSize:15,color:'555555'});
        const buls = (d.bullets||[]).filter(Boolean);
        if (buls.length) s.addText(buls.map(b=>({text:b,options:{bullet:{type:'bullet'},paraSpaceAfter:6}})),{x:.6,y:d.body?2.5:1.6,w:8.8,h:3,fontSize:15,color:'333333'});
        break;
      case 'image-text':
        s.addText(d.heading||'', {x:5.2,y:.5,w:4.4,h:.8,fontSize:22,bold:true,color:dH,fontFace:'Georgia'});
        if (d.image) { try { s.addImage({path:d.image,x:.3,y:.5,w:4.5,h:4.5}); } catch(_){} }
        else { s.addShape(pptx.ShapeType.rect,{x:.3,y:.5,w:4.5,h:4.5,fill:{color:'EEEEEE'}}); }
        const ib=(d.bullets||[]).filter(Boolean);
        if (ib.length) s.addText(ib.map(b=>({text:b,options:{bullet:{type:'bullet'},paraSpaceAfter:8}})),{x:5.2,y:1.5,w:4.4,h:3.5,fontSize:14,color:'333333'});
        break;
      case 'product-grid':
        s.addText(d.heading||'Products',{x:.5,y:.3,w:9,h:.7,fontSize:24,bold:true,color:dH,fontFace:'Georgia'});
        (d.products||[]).slice(0,4).forEach((p,i)=>{
          const x=i%2===0?.3:5, y=i<2?1.1:3.1;
          s.addShape(pptx.ShapeType.rect,{x,y,w:4.5,h:1.8,fill:{color:b.pale.replace('#','')},line:{color:bH,width:3}});
          s.addText(p.name||'',{x:x+.2,y:y+.1,w:4.1,h:.5,fontSize:14,bold:true,color:dH});
          s.addText(p.price||'',{x:x+.2,y:y+.55,w:4.1,h:.4,fontSize:13,bold:true,color:bH});
          s.addText(p.desc||'',{x:x+.2,y:y+.95,w:4.1,h:.7,fontSize:11,color:'555555'});
        });
        break;
      case 'contact':
        s.background={color:bH};
        s.addText(d.heading||'Get in Touch',{x:.5,y:1.2,w:9,h:1,fontSize:32,bold:true,color:'FFFFFF',align:'center',fontFace:'Georgia'});
        s.addText([d.email,d.phone,d.website,d.address].filter(Boolean).join('  ·  '),{x:.5,y:2.5,w:9,h:1.2,fontSize:15,color:'DDDDDD',align:'center'});
        break;
    }
  }
  await pptx.writeFile({fileName:`${meta.slug}.pptx`});
}

// NEW PRESENTATION MODAL — separate from render cycle
// ═══════════════════════════════════════════════════════
function openNewModal() {
  // Inject modal HTML into body (outside #root so it doesn't get wiped by render)
  const existing = document.getElementById('new-modal-overlay');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', renderNewModal());

  const overlay = document.getElementById('new-modal-overlay');
  const titleInput = document.getElementById('nf-title');
  const slugInput = document.getElementById('nf-slug');
  let slugUserEdited = false;

  // Auto-fill slug from title
  titleInput.addEventListener('input', () => {
    if (!slugUserEdited) slugInput.value = slugify(titleInput.value);
  });
  slugInput.addEventListener('input', () => { slugUserEdited = true; });
  slugInput.addEventListener('blur', () => { slugInput.value = slugify(slugInput.value); });

  function closeModal() { overlay.remove(); }

  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  async function doCreate(withAI) {
    const title = titleInput.value.trim();
    if (!title) { showToast('Title is required', 'error'); titleInput.focus(); return; }
    const slug = slugify(slugInput.value || title);
    if (!slug) { showToast('Invalid URL/slug', 'error'); return; }
    if (S.presentations.find(p => p.slug === slug)) { showToast('A presentation with this URL already exists', 'error'); return; }
    const brand = document.getElementById('nf-brand').value;
    const project = document.getElementById('nf-project').value.trim();
    const description = document.getElementById('nf-description').value.trim();
    const visible_from = document.getElementById('nf-visible-from').value || null;
    const expires = document.getElementById('nf-expires').value || null;
    const brief = document.getElementById('nf-brief').value.trim();

    if (withAI && !brief) { showToast('Add a content brief for AI generation', 'error'); return; }
    if (withAI && !S.workerUrl) { showToast('Set Worker URL in Settings first', 'error'); return; }

    closeModal();
    S.current = { id: crypto.randomUUID(), slug, title, brand, project, description, visible_from, expires, status:'draft', created: new Date().toISOString().slice(0,10), updated: new Date().toISOString().slice(0,10), slideCount:0 };
    S.brand = brand;
    S.slides = [defaultSlide('cover')];
    S.presentationSha = '';
    S.activeSlide = 0;
    S.dirty = true;
    S.view = 'editor';
    render();

    if (withAI) {
      S.generating = true; render();
      try {
        const result = await generateFullDeck(brief, brand);
        if (result.slides?.length) {
          S.slides = result.slides.map(sl => ({ id: crypto.randomUUID(), layout: sl.layout, data: sl.data }));
          S.activeSlide = 0;
        }
        showToast('Deck generated! Review and publish.', 'success');
      } catch(err) { showToast('AI error: ' + err.message, 'error'); }
      S.generating = false; S.dirty = true; render();
    }
  }

  document.getElementById('modal-empty-btn').addEventListener('click', () => doCreate(false));
  document.getElementById('modal-ai-btn').addEventListener('click', () => doCreate(true));
  titleInput.focus();
}

// EVENT HANDLERS
// ═══════════════════════════════════════════════════════
document.addEventListener('click', async e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;

  if (action === 'login') {
    const val = document.getElementById('pat-input')?.value?.trim();
    if (!val) { showToast('Enter your GitHub token', 'error'); return; }
    S.pat = val; sessionStorage.setItem('ps_pat', val);
    S.loading = true; render();
    try { await loadCatalogue(); S.loading = false; render(); }
    catch(err) { S.pat=''; sessionStorage.removeItem('ps_pat'); S.loading=false; showToast('Invalid token: ' + err.message, 'error'); render(); }
    return;
  }
  if (action === 'lock') { S.pat=''; sessionStorage.removeItem('ps_pat'); S.view='list'; S.current=null; render(); return; }
  if (action === 'goHome') {
    if (S.view === 'editor' && S.dirty && !confirm('Unsaved changes. Leave anyway?')) return;
    S.view = 'list'; S.current = null; S.dirty = false;
    S.loading = true; render();
    try { await loadCatalogue(); } catch(_){}
    S.loading = false; render(); return;
  }
  if (action === 'setBrand') { S.brand = el.dataset.brand; S.view = 'list'; render(); return; }
  if (action === 'openSettings') { S.view = 'settings'; render(); return; }
  if (action === 'cycleTheme') {
    const themes = THEMES; const idx = (themes.indexOf(getTheme()) + 1) % themes.length;
    setTheme(themes[idx]); render(); return;
  }
  if (action === 'setTheme') { setTheme(el.dataset.theme); render(); return; }
  if (action === 'saveWorkerUrl') {
    const url = document.getElementById('worker-url-input')?.value?.trim().replace(/\/$/,'');
    S.workerUrl = url; localStorage.setItem('ps_worker', url);
    showToast('Worker URL saved', 'success'); render(); return;
  }
  if (action === 'newPresentation') { openNewModal(); return; }

  // Editor actions
  if (action === 'selectSlide') { S.activeSlide = parseInt(el.dataset.idx); render(); return; }
  if (action === 'addSlide') { S.modal = 'add-slide'; render(); return; }
  if (action === 'closeAddSlide') { S.modal = null; render(); return; }
  if (action === 'addSlideLayout') {
    S.slides.splice(S.activeSlide + 1, 0, defaultSlide(el.dataset.layout));
    S.activeSlide += 1; S.modal = null; S.dirty = true; render(); return;
  }
  if (action === 'deleteSlide') {
    const idx = parseInt(el.dataset.idx);
    if (S.slides.length <= 1) { showToast('Cannot delete the only slide', 'error'); return; }
    if (!confirm('Delete this slide?')) return;
    S.slides.splice(idx, 1);
    S.activeSlide = Math.min(S.activeSlide, S.slides.length - 1);
    S.dirty = true; render(); return;
  }
  if (action === 'slideUp') {
    const idx = parseInt(el.dataset.idx);
    if (idx === 0) return;
    [S.slides[idx-1], S.slides[idx]] = [S.slides[idx], S.slides[idx-1]];
    S.activeSlide = idx - 1; S.dirty = true; render(); return;
  }
  if (action === 'slideDown') {
    const idx = parseInt(el.dataset.idx);
    if (idx >= S.slides.length - 1) return;
    [S.slides[idx], S.slides[idx+1]] = [S.slides[idx+1], S.slides[idx]];
    S.activeSlide = idx + 1; S.dirty = true; render(); return;
  }
  if (action === 'addBullet') {
    S.slides[S.activeSlide].data.bullets.push('');
    S.dirty = true; render(); return;
  }
  if (action === 'removeBullet') {
    S.slides[S.activeSlide].data.bullets.splice(parseInt(el.dataset.idx), 1);
    S.dirty = true; render(); return;
  }
  if (action === 'previewPres') {
    const html = generateRevealHTML(S.current, S.slides);
    const blob = new Blob([html], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 8000); return;
  }
  if (action === 'savePres') {
    S.saving = true; render();
    try { await savePresentation(); S.dirty = false; showToast('Saved', 'success'); }
    catch(err) { showToast('Save failed: ' + err.message, 'error'); }
    S.saving = false; render(); return;
  }
  if (action === 'publishPres') {
    S.saving = true; render();
    try {
      await savePresentation();
      const html = generateRevealHTML(S.current, S.slides);
      const existing = await ghGet(`view/${S.current.slug}/index.html`);
      await ghPut(`view/${S.current.slug}/index.html`, html, `Publish ${S.current.slug}`, existing?.sha);
      const entry = { ...S.current, slideCount: S.slides.length, updated: new Date().toISOString().slice(0,10), status: S.current.status === 'draft' ? 'published' : S.current.status };
      const idx = S.presentations.findIndex(p => p.slug === S.current.slug);
      if (idx >= 0) S.presentations[idx] = entry; else S.presentations.push(entry);
      S.current = entry;
      await saveCatalogue();
      S.dirty = false; showToast('Published! Live in ~30s', 'success', 4000);
    } catch(err) { showToast('Publish failed: ' + err.message, 'error'); }
    S.saving = false; render(); return;
  }
  if (action === 'downloadPPTX') {
    try { await downloadPPTX(S.current, S.slides); showToast('PPTX downloaded', 'success'); }
    catch(err) { showToast('PPTX error: ' + err.message, 'error'); }
    return;
  }
  if (action === 'downloadPDF') {
    if (S.dirty) { showToast('Save and publish first, then download PDF', 'info'); return; }
    const url = `${GH_PAGES}/view/${S.current.slug}/?print-pdf`;
    const win = window.open(url, '_blank');
    if (win) { showToast('Press Ctrl+P / Cmd+P to save as PDF', 'info', 5000); }
    return;
  }
  if (action === 'aiSlide') {
    if (!S.workerUrl) { showToast('Set Worker URL in Settings first', 'error'); return; }
    S.generating = true; render();
    try {
      const result = await generateSlideContent(S.slides[S.activeSlide], S.brand);
      if (result.data) { S.slides[S.activeSlide].data = result.data; S.dirty = true; }
      showToast('Content generated', 'success');
    } catch(err) { showToast('AI error: ' + err.message, 'error'); }
    S.generating = false; render(); return;
  }

  // Add-slide overlay close
  if (action === 'closeAddSlide') { S.modal = null; render(); return; }
  if (e.target.id === 'add-slide-overlay') { S.modal = null; render(); return; }
});

});

// Editor field input — update state + preview directly, no full re-render
document.addEventListener('input', e => {
  const el = e.target;
  if (!S.current || S.view !== 'editor') return;
  const slide = S.slides[S.activeSlide];
  if (!slide) return;

  // Layout select
  if (el.id === 'layout-select') {
    slide.layout = el.value;
    slide.data = defaultSlide(el.value).data;
    S.dirty = true; render(); return;
  }
  // Slide data fields
  if (el.dataset.field) {
    if (el.dataset.field === 'bullet') slide.data.bullets[parseInt(el.dataset.idx)] = el.value;
    else slide.data[el.dataset.field] = el.value;
    S.dirty = true;
    // Update dirty indicator
    const dot = document.getElementById('dirty-dot');
    if (!dot) {
      const titleEl = document.querySelector('.editor-title');
      if (titleEl && !titleEl.querySelector('.dirty-dot')) {
        titleEl.insertAdjacentHTML('beforeend','<span class="dirty-dot" id="dirty-dot"></span>');
      }
    }
    // Update preview in place
    updatePreview(slide);
    return;
  }
  if (el.dataset.pfield !== undefined) {
    slide.data.products[parseInt(el.dataset.pidx)][el.dataset.pfield] = el.value;
    S.dirty = true; updatePreview(slide); return;
  }
});

document.addEventListener('change', e => {
  const el = e.target;
  if (el.id === 'filter-select') { S.filterStatus = el.value; render(); return; }
  if (el.id === 'layout-select') {
    const slide = S.slides[S.activeSlide];
    if (slide && slide.layout !== el.value) {
      slide.layout = el.value; slide.data = defaultSlide(el.value).data;
      S.dirty = true; render();
    }
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('pat-input') === document.activeElement) {
    document.querySelector('[data-action=login]')?.click();
  }
  if (e.key === 'Escape') {
    const overlay = document.getElementById('add-slide-overlay');
    if (overlay) { S.modal = null; render(); }
  }
});

function updatePreview(slide) {
  const frame = document.getElementById('slide-preview-frame');
  if (!frame) return;
  const brand = BRANDS[S.brand];
  const tmp = document.createElement('div');
  tmp.innerHTML = renderSlidePreview(slide, brand);
  const newFrame = tmp.querySelector('#slide-preview-frame');
  if (newFrame) frame.innerHTML = newFrame.innerHTML;
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
async function init() {
  if (S.pat) {
    S.loading = true; render();
    try { await loadCatalogue(); }
    catch(err) { S.pat=''; sessionStorage.removeItem('ps_pat'); showToast('Session expired, please sign in again','error'); }
    S.loading = false;
  }
  render();
}
init();
</script>
</body>
</html>
