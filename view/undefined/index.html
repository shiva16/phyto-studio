<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>test1 — Phyto Evolution</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#111;height:100vh;overflow:hidden}
#lock{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#fff;gap:14px;text-align:center;padding:32px}
#lock .lk-icon{font-size:52px}
#lock h2{font-size:22px;font-weight:600}
#lock p{font-size:13px;color:rgba(255,255,255,.5);max-width:300px;line-height:1.6}
#ps-bar{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(27,58,47,.96);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:42px;font-size:13px;color:rgba(255,255,255,.7)}
#ps-bar strong{color:#fff;font-weight:600}
#ps-bar a{color:rgba(255,255,255,.5);text-decoration:none;font-size:12px}
#ps-bar a:hover{color:#fff}
#reveal-root{display:none}
.reveal .slides{margin-top:42px}
</style>
</head>
<body>
<div id="lock"><div class="lk-icon">🔒</div><h2>Protected Presentation</h2><p>You need a valid access link from Phyto Evolution to view this content.</p></div>
<div id="reveal-root">
  <div id="ps-bar"><strong>Phyto Evolution</strong><span>test1</span><a href="https://shiva16.github.io/phyto-studio/catalogue/">← All Catalogues</a></div>
  <div class="reveal"><div class="slides" id="slides-root"></div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
<script>
(async()=>{
  const m=location.hash.match(/[#&]k=([0-9a-f]{64})/);
  if(!m){document.getElementById('lock').style.display='flex';return;}
  try{
    const ck=await crypto.subtle.importKey('raw',Uint8Array.from(m[1].match(/.{2}/g),h=>parseInt(h,16)),'AES-GCM',false,['decrypt']);
    const res=await fetch('./data.enc');
    if(!res.ok)throw new Error('not found');
    const buf=Uint8Array.from(atob(await res.text()),c=>c.charCodeAt(0));
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:buf.slice(0,12)},ck,buf.slice(12));
    const d=JSON.parse(new TextDecoder().decode(pt));
    const root=document.getElementById('slides-root');
    d.slides.forEach((img,i)=>{
      const sec=document.createElement('section');
      const raw=img.includes(',')?img.split(',')[1]:img;
      const blob=new Blob([Uint8Array.from(atob(raw),c=>c.charCodeAt(0))],{type:'image/jpeg'});
      sec.setAttribute('data-background-image',URL.createObjectURL(blob));
      sec.setAttribute('data-background-size','cover');
      if(d.notes?.[i]){const n=document.createElement('aside');n.className='notes';n.textContent=d.notes[i];sec.appendChild(n);}
      root.appendChild(sec);
    });
    document.getElementById('lock').style.display='none';
    document.getElementById('reveal-root').style.display='block';
    Reveal.initialize({hash:false,controls:true,progress:true,transition:'slide',touch:true,margin:0});
  }catch(e){
    const l=document.getElementById('lock');
    l.querySelector('h2').textContent='Invalid or expired link.';
    l.querySelector('p').textContent='Contact Phyto Evolution for a valid access link.';
    l.style.display='flex';
  }
  document.addEventListener('contextmenu',e=>e.preventDefault());
  document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&'ps'.includes(e.key))e.preventDefault();});
})();
</script>
</body></html>
