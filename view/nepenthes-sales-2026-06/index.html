<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nepenthes sales 2026-06</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/white.css">
<style>
:root{--brand:#2d6a4f;--brand-dark:#1b4332;--brand-light:#95d5b2;--brand-pale:#edf7f1;}
.reveal{font-family:'Nunito',sans-serif;}
.reveal h1,.reveal h2,.reveal h3{font-family:'Cormorant Garamond',serif;color:var(--brand-dark);text-transform:none;letter-spacing:-.02em;}
.reveal h1{font-size:2.4em}.reveal h2{font-size:1.8em}
.reveal .slides section{text-align:left}
.reveal .slides section.center-slide{text-align:center}
.cover-slide{background:var(--brand-dark)!important;color:#fff!important}
.cover-slide h1{color:#fff;font-size:2.5em;margin-bottom:.2em}
.cover-slide .sub{color:var(--brand-light);font-size:1.1em}
.cover-logo{font-family:'Cormorant Garamond',serif;font-size:.85em;color:rgba(255,255,255,.4);margin-bottom:2em;letter-spacing:.1em;text-transform:uppercase}
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:1em;margin-top:.8em}
.product-card{background:var(--brand-pale);border-left:4px solid var(--brand);border-radius:6px;padding:.9em 1.1em}
.product-card .pname{font-family:'Cormorant Garamond',serif;font-size:1.1em;font-weight:600;color:var(--brand-dark)}
.product-card .pprice{font-size:.95em;font-weight:700;color:var(--brand);margin:.2em 0}
.product-card .pdesc{font-size:.78em;color:#555}
.contact-slide{background:var(--brand)!important;color:#fff!important;text-align:center}
.contact-slide h2{color:#fff}
.contact-slide .info{font-size:.95em;color:rgba(255,255,255,.85);line-height:2.2}
.contact-slide .info a{color:var(--brand-light);text-decoration:none}
ul{padding-left:1.2em}li{margin-bottom:.4em;font-size:.9em}
#ps-bar{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:space-between;padding:0 1.5em;height:44px;font-family:'Nunito',sans-serif;font-size:.8em;color:rgba(255,255,255,.6)}
#ps-bar .logo{color:#fff;font-family:'Cormorant Garamond',serif;font-size:1.2em}
#ps-bar a{color:rgba(255,255,255,.55);text-decoration:none}
#ps-bar a:hover{color:#fff}
.reveal .slides{margin-top:44px}
</style></head><body>
<div id="ps-bar">
  <span class="logo">Phyto Studio</span>
  <span>Nepenthes sales 2026-06</span>
  <a href="https://shiva16.github.io/phyto-studio/catalogue/">← All Catalogues</a>
</div>
<div class="reveal"><div class="slides">
<section class="cover-slide center-slide">
  <div class="cover-logo">Carnivorous Plants — carnivorousplants.in</div>
  <h1></h1>
  <p class="sub"></p>
</section>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
<script>
Reveal.initialize({hash:true,transition:'slide',controls:true,progress:true,slideNumber:false,touch:true,overview:true,margin:.06});
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&(e.key==='p'||e.key==='s'))e.preventDefault()});
</script></body></html>
