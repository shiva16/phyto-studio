<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phyto Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Roboto:ital,wght@0,400;0,700;1,400&family=Lato:ital,wght@0,400;0,700;1,400&family=Montserrat:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Oswald:wght@400;600&family=Raleway:ital,wght@0,400;0,700;1,400&family=Nunito:ital,wght@0,400;0,700;1,400&family=Open+Sans:ital,wght@0,400;0,700;1,400&family=Merriweather:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --bg:#fff;--surface:#f8f9fa;--surface2:#f1f3f4;--border:#e0e0e0;--border2:#c6c9ca;
  --text:#202124;--text2:#5f6368;--text3:#9aa0a6;
  --accent:#1a6b55;--accent2:#145a46;--accent-bg:#e8f4f0;
  --danger:#d93025;--warn:#f29900;--info:#1a73e8;
  --canvas-area:#e8eaed;
  --hdr:48px;--tb:44px;--sp:216px;--pp:264px;--notes:120px;
  --r:4px;--r2:8px;
  --sh:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
  --sh2:0 4px 16px rgba(0,0,0,.18);
}
[data-theme=dark]{
  --bg:#1e1e1e;--surface:#2d2d30;--surface2:#252526;--border:#3c3c3c;--border2:#555;
  --text:#d4d4d4;--text2:#9d9d9d;--text3:#6e6e6e;--canvas-area:#141414;--accent-bg:#1a3330;
}
[data-theme=paper]{
  --bg:#fdf6e3;--surface:#f5eedb;--surface2:#eee8d5;--border:#d4c99a;--border2:#b0a878;
  --text:#2e2e2e;--text2:#657b83;--text3:#93a1a1;--canvas-area:#d4c99a;
}
html,body{height:100%;font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);overflow:hidden;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit}

/* ---- BUTTONS ---- */
/* Icon/toolbar buttons use system sans-serif for broad Unicode glyph coverage */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);border:none;font-size:13px;font-weight:500;font-family:system-ui,sans-serif;cursor:pointer;transition:background .15s,opacity .15s;white-space:nowrap;line-height:1}
.modal-title,.card-thumb-empty,.csb-icon,.notes-hdr{font-family:system-ui,sans-serif}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface2);color:var(--text)}.btn-secondary:hover{background:var(--border)}
.btn-ghost{background:transparent;color:var(--text2)}.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{width:28px;height:28px;padding:0;border-radius:var(--r);border:none;background:transparent;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .1s,color .1s;flex-shrink:0}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
.btn-icon.active{background:var(--accent-bg);color:var(--accent)}
.btn-icon svg{pointer-events:none}

/* ---- AUTH ---- */
#auth-view{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--surface2)}
.auth-card{display:flex;width:760px;max-width:96vw;border-radius:12px;overflow:hidden;box-shadow:var(--sh2)}
.auth-left{background:#1b3a2f;color:#fff;padding:48px 40px;width:310px;flex-shrink:0;display:flex;flex-direction:column;gap:20px}
.auth-brand{font-size:20px;font-weight:600;letter-spacing:-.3px}
.auth-desc{font-size:13px;line-height:1.7;color:rgba(255,255,255,.65)}
.auth-sites{margin-top:auto;display:flex;flex-direction:column;gap:6px}
.auth-site{font-size:11px;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:6px}
.auth-site-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);flex-shrink:0}
.auth-right{background:var(--bg);padding:48px 40px;flex:1}
.auth-right h2{font-size:20px;font-weight:600;margin-bottom:6px}
.auth-right p{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.5}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.form-group input{width:100%;border:1.5px solid var(--border);border-radius:var(--r);padding:9px 12px;font-size:13px;font-family:var(--font);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.form-group input:focus{border-color:var(--accent)}
.auth-err{font-size:12px;color:var(--danger);margin-top:10px;min-height:18px}

/* ---- DASHBOARD ---- */
#dash-view{display:flex;flex-direction:column;height:100vh}
.dash-hdr{height:56px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.brand-tabs{display:flex;gap:4px}
.brand-tab{padding:5px 13px;border-radius:20px;border:1.5px solid transparent;background:transparent;font-size:12px;font-weight:600;font-family:var(--font);color:var(--text2);cursor:pointer;transition:all .15s}
.brand-tab:hover{color:var(--text);background:var(--surface2)}
.brand-tab.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.dash-logo{font-size:15px;font-weight:600;cursor:pointer;color:var(--text)}
.dash-logo em{color:var(--accent);font-style:normal}
.dash-search{flex:1;max-width:360px;position:relative}
.dash-search input{width:100%;height:34px;border:1.5px solid var(--border);border-radius:20px;padding:0 14px 0 36px;font-size:13px;font-family:var(--font);background:var(--surface2);color:var(--text);outline:none}
.dash-search input:focus{border-color:var(--accent);background:var(--bg)}
.dash-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.dash-body{flex:1;overflow-y:auto;padding:28px 32px}
.dash-section{margin-bottom:36px}
.dash-section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.dash-section-hdr h3{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.pres-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(208px,1fr));gap:18px}
/* Stats strip */
.stat-strip{display:flex;gap:10px;padding:14px 28px;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.stat-strip::-webkit-scrollbar{display:none}
.stat-card{background:var(--surface2);border-radius:var(--r2);padding:11px 16px;min-width:100px;display:flex;flex-direction:column;gap:3px;flex-shrink:0;border:1px solid transparent;cursor:default;transition:border-color .15s}
.stat-card:hover{border-color:var(--border2)}
.stat-card.accent{background:var(--accent-bg);border-color:var(--accent)}
.stat-num{font-size:22px;font-weight:700;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:11px;color:var(--text2);font-weight:500}
.stat-card.accent .stat-num,.stat-card.accent .stat-lbl{color:var(--accent)}
/* Greeting */
.dash-greeting{padding:22px 28px 0;display:flex;align-items:baseline;gap:10px;flex-shrink:0}
.dash-greeting-text{font-size:19px;font-weight:700;color:var(--text)}
.dash-greeting-sub{font-size:13px;color:var(--text2)}
/* Featured strip */
.featured-wrap{padding:18px 28px 4px;flex-shrink:0}
.featured-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.featured-strip{display:flex;gap:14px;overflow-x:auto;padding-bottom:4px}
.featured-strip::-webkit-scrollbar{height:3px}
.featured-strip::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.featured-card{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;flex-shrink:0;width:260px;overflow:hidden;transition:box-shadow .15s,border-color .15s,transform .1s}
.featured-card:hover{box-shadow:var(--sh2);border-color:var(--border2);transform:translateY(-2px)}
.featured-thumb{height:146px;overflow:hidden;position:relative}
.featured-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.featured-info{padding:10px 12px 12px}
.featured-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.featured-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
/* Grid header with sort */
.grid-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.grid-hdr-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.sort-sel{height:26px;border:1px solid var(--border);border-radius:var(--r);font-size:11px;font-family:var(--font);color:var(--text2);background:var(--bg);padding:0 6px;cursor:pointer;outline:none}
.sort-sel:hover,.sort-sel:focus{border-color:var(--accent);color:var(--text)}
/* Thumb fallback */
.thumb-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:800;color:rgba(255,255,255,.85);font-family:var(--font);letter-spacing:-1px;user-select:none}
/* Card improvements */
.card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.card-slides{font-size:10px;color:var(--text3)}
.card-time{font-size:10px;color:var(--text3)}
/* Empty state */
.dash-empty{grid-column:1/-1;text-align:center;padding:56px 20px;display:flex;flex-direction:column;align-items:center;gap:10px}
.dash-empty-icon{font-size:44px;opacity:.25;line-height:1}
.dash-empty h3{font-size:15px;font-weight:600;color:var(--text)}
.dash-empty p{font-size:13px;color:var(--text2);max-width:280px;line-height:1.5}
.pres-card{background:var(--bg);border-radius:var(--r2);border:1.5px solid var(--border);cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .1s;overflow:hidden;user-select:none}
.pres-card:hover{box-shadow:var(--sh2);border-color:var(--border2);transform:translateY(-2px)}
.pres-card.new-card{border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:168px;color:var(--text3)}
.pres-card.new-card:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-bg)}
.new-card-plus{font-size:28px;margin-bottom:8px;line-height:1}
.new-card-lbl{font-size:12px;font-weight:500}
.card-thumb{height:126px;background:var(--surface2);overflow:hidden;position:relative}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.card-thumb-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--border2)}
.card-info{padding:11px 14px 13px}
.card-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.card-meta{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2)}
.status-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pip-draft{background:var(--text3)}.pip-published{background:#34a853}.pip-archived{background:var(--border2)}.pip-scheduled{background:var(--warn)}.pip-expired{background:var(--danger)}
.brand-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:2px 6px;border-radius:3px;background:var(--accent-bg);color:var(--accent)}

/* ---- EDITOR SHELL ---- */
#editor-view{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Header */
#ed-hdr{height:var(--hdr);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0;z-index:100;position:relative}
.ed-logo{font-size:14px;font-weight:600;cursor:pointer;color:var(--text);padding:4px 8px;border-radius:var(--r);white-space:nowrap;flex-shrink:0}
.ed-logo:hover{background:var(--surface2)}
.ed-title-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
#ed-title{border:none;outline:none;font-size:14px;font-weight:500;font-family:var(--font);color:var(--text);background:transparent;padding:4px 6px;border-radius:var(--r);min-width:80px;max-width:240px;transition:max-width .2s}
#ed-title:focus{max-width:520px}
#ed-title:hover{background:var(--surface2)}
#ed-title:focus{background:var(--surface2);outline:1.5px solid var(--accent)}
.ed-save-badge{font-size:11px;color:var(--text3);flex-shrink:0;padding:2px 6px}

/* Menu bar */
.menu-bar{display:flex;align-items:center;gap:1px}
.mb-item{padding:5px 9px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text);user-select:none;position:relative;white-space:nowrap}
.mb-item:hover,.mb-item.open{background:var(--surface2)}
.mb-dropdown{position:absolute;top:calc(100% + 4px);left:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh2);min-width:210px;padding:4px;z-index:2000;display:none}
.mb-item.open .mb-dropdown{display:block}
.mb-action{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text);white-space:nowrap;gap:24px}
.mb-action:hover{background:var(--surface2)}
.mb-action.dis{color:var(--text3);pointer-events:none}
.mb-action .kb{font-size:11px;color:var(--text3)}
.mb-sep{height:1px;background:var(--border);margin:4px 0}

.ed-hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0}

/* Toolbar */
#ed-tb{height:var(--tb);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:2px;flex-shrink:0;overflow-x:auto;overflow-y:visible;position:relative;z-index:50}
#ed-tb::-webkit-scrollbar{height:0}
.tb-sep{width:1px;height:22px;background:var(--border);margin:0 4px;flex-shrink:0}
.tb-btn{width:30px;height:30px;border:none;border-radius:var(--r);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);transition:background .1s,color .1s;flex-shrink:0;position:relative}
.tb-btn:hover{background:var(--surface2);color:var(--text)}
.tb-btn.active{background:var(--accent-bg);color:var(--accent)}
.tb-btn[data-tip]:hover::after{content:attr(data-tip);position:absolute;top:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#333;color:#fff;font-size:11px;padding:3px 7px;border-radius:3px;white-space:nowrap;pointer-events:none;z-index:9999;font-family:var(--font)}
.tb-sel{height:28px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-family:var(--font);color:var(--text);background:var(--bg);padding:0 4px;cursor:pointer;outline:none;flex-shrink:0}
.tb-sel:focus{border-color:var(--accent)}
.tb-num{height:28px;width:46px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-family:var(--font);color:var(--text);text-align:center;background:var(--bg);padding:0 4px;outline:none;flex-shrink:0}
.tb-num:focus{border-color:var(--accent)}
.color-swatch-btn{width:30px;height:30px;border:none;background:transparent;cursor:pointer;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex-shrink:0;padding:4px}
.color-swatch-btn:hover{background:var(--surface2)}
.csb-icon{font-size:13px;line-height:1;color:var(--text2)}
.csb-bar{width:18px;height:3px;border-radius:2px}
.zoom-lbl{font-size:12px;color:var(--text2);min-width:38px;text-align:center;flex-shrink:0;cursor:pointer;padding:2px 4px;border-radius:var(--r)}
.zoom-lbl:hover{background:var(--surface2)}
/* Font picker */
.tb-font-picker{position:relative;flex-shrink:0}
.tb-font-btn{height:28px;width:162px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:12px;cursor:pointer;display:flex;align-items:center;padding:0 8px;gap:4px;overflow:hidden;white-space:nowrap;transition:border-color .15s;flex-shrink:0}
.tb-font-btn:hover,.tb-font-btn:focus{border-color:var(--accent);outline:none}
.tb-font-display{flex:1;overflow:hidden;text-overflow:ellipsis;text-align:left}
.tb-font-chevron{color:var(--text3);font-size:9px;flex-shrink:0}
.tb-font-dropdown{position:absolute;top:calc(100% + 3px);left:0;width:210px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh2);z-index:2000;display:none;flex-direction:column}
.tb-font-dropdown.open{display:flex}
.tb-font-search{border:none;border-bottom:1px solid var(--border);padding:7px 10px;font-size:12px;font-family:var(--font);color:var(--text);background:var(--bg);outline:none;border-radius:var(--r2) var(--r2) 0 0;width:100%}
.tb-font-list{max-height:260px;overflow-y:auto}
.tb-font-item{padding:7px 12px;font-size:14px;cursor:pointer;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.tb-font-item:hover{background:var(--accent-bg);color:var(--accent)}
.tb-font-item.active{background:var(--accent-bg);color:var(--accent);font-weight:600}

/* Shape dropdown */
.shape-picker{position:absolute;top:calc(100% + 4px);left:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh2);padding:8px;display:none;grid-template-columns:repeat(4,32px);gap:4px;z-index:500}
.shape-picker.open{display:grid}
.sp-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.sp-btn:hover{background:var(--accent-bg);border-color:var(--accent)}

/* Body */
#ed-body{flex:1;display:flex;overflow:hidden}

/* Slide panel */
#slide-panel{width:var(--sp);background:var(--surface2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sp-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px 7px 14px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);flex-shrink:0}
#slide-list{flex:1;overflow-y:auto;padding:6px 8px}
.slide-item{display:flex;align-items:flex-start;gap:6px;padding:5px;border-radius:var(--r);cursor:pointer;margin-bottom:3px;border:2px solid transparent;transition:border-color .1s,background .1s;user-select:none;position:relative}
.slide-item:hover{background:var(--border)}
.slide-item.active{border-color:var(--accent);background:var(--accent-bg)}
.slide-item.drag-over{border-color:var(--accent);border-style:dashed}
.slide-num{font-size:10px;color:var(--text3);width:16px;text-align:right;flex-shrink:0;padding-top:3px}
.slide-thumb-wrap{flex:1;aspect-ratio:16/9;border-radius:2px;overflow:hidden;border:1px solid var(--border);background:#fff}
.slide-thumb-wrap img{width:100%;height:100%;display:block;object-fit:cover}
.slide-empty-thumb{width:100%;height:100%;background:linear-gradient(135deg,var(--surface2),var(--border))}

/* Canvas area */
#canvas-area{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;background:var(--canvas-area);position:relative}
#canvas-wrap{box-shadow:0 4px 24px rgba(0,0,0,.28);background:#fff;position:relative;flex-shrink:0;cursor:default}
#canvas-wrap canvas{display:block}

/* Props panel */
#props-panel{width:var(--pp);background:var(--bg);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.pp-hdr{padding:9px 14px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);flex-shrink:0}
.pp-body{flex:1;overflow-y:auto;padding:12px 12px}
.pp-section{margin-bottom:18px}
.pp-section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.pp-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}

<script>
// ===================== CONSTANTS =====================
const GH_OWNER='shiva16', GH_REPO='phyto-studio', GH_BRANCH='main';
const SLIDE_W=1280, SLIDE_H=720;
const FONTS=['Plus Jakarta Sans','Poppins','DM Sans','Nunito','Open Sans','Lato','Raleway','Montserrat','Roboto','Oswald','Inter','Playfair Display','Merriweather','Libre Baskerville','Georgia','Garamond','Palatino','Times New Roman','Arial','Verdana','Trebuchet MS','Impact','Courier New','Source Code Pro'];
const FONT_SIZES=[8,9,10,11,12,14,16,18,20,24,28,32,36,40,48,56,64,72,96];
const BRAND_COLORS={phytolabs:'#1a535c',tcplants:'#52796f',carnivorousplants:'#2d6a4f',all:'#1a6b55'};
const SHAPE_FILL_DEFAULTS=['#4285f4','#34a853','#fbbc04','#ea4335','#9c27b0','#00bcd4','#ff5722','#607d8b'];

// ===================== STATE =====================
const S={
  pat: sessionStorage.getItem('ps_pat')||'',
  workerUrl: localStorage.getItem('ps_worker')||'',
  brand: detectBrand(),
  view:'auth',
  presentations:[], catSha:null,
  current:null,      // presentation meta object
  slides:[],         // [{id,fabricJson,bg,thumbnail,notes}]
  curSlide:0,
  fc:null,           // fabric.Canvas
  hist:[], histIdx:-1,
  clip:null,
  zoom:0.6,
  tool:'select',
  theme: localStorage.getItem('ps_theme')||'light',
  dirty:false, saving:false,
  notesOpen:false,
  isDrawing:false, drawStart:null, drawObj:null,
  menuOpen:null,
  aesKey:null,       // CryptoKey derived from PAT
};

// ===================== MODULE-LEVEL VARS =====================
let _suppressHistory=false;
const _toHexCtx=(()=>{try{return document.createElement('canvas').getContext('2d');}catch{return null;}})();
function _editorMenuCloseHandler(e){if(!e.target.closest('.mb-item'))closeMenus();}

// ===================== UTILS =====================
function uuid(){return crypto.randomUUID?crypto.randomUUID():'id_'+Math.random().toString(36).slice(2)}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}}
function slugify(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'untitled'}
function fmtDate(iso){if(!iso)return'';return new Date(iso).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}

function toast(msg,type='',ms=3000){
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  el.textContent=msg;
  document.getElementById('toast-area').appendChild(el);
  setTimeout(()=>el.remove(),ms);
}

function detectBrand(){
  const h=location.hostname;
  if(h.includes('phytolabs'))return'phytolabs';
  if(h.includes('tcplants'))return'tcplants';
  if(h.includes('carnivorousplants')||h.includes('cpindia'))return'carnivorousplants';
  return'all';
}

function setTheme(t){
  S.theme=t;
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('ps_theme',t);
}

// ===================== AES-256-GCM ENCRYPTION =====================
// Key is derived from the PAT — the PAT is the only secret; it never touches the repo.
// Encrypted files are AES-GCM: [12-byte IV][ciphertext], base64-encoded.
// Repo files are unreadable without the PAT even if the repo is public.

async function deriveKey(pat){
  const raw=await crypto.subtle.importKey('raw',new TextEncoder().encode(pat),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:new TextEncoder().encode('phyto-studio-2026'),iterations:100000,hash:'SHA-256'},
    raw,{name:'AES-GCM',length:256},false,['encrypt','decrypt']
  );
}

function _u8ToBase64(buf){
  let s='';
  for(let i=0;i<buf.length;i+=4096)s+=String.fromCharCode(...buf.subarray(i,i+4096));
  return btoa(s);
}

async function aesEncrypt(plaintext){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},S.aesKey,new TextEncoder().encode(plaintext));
  const buf=new Uint8Array(12+ct.byteLength);
  buf.set(iv,0);buf.set(new Uint8Array(ct),12);
  return _u8ToBase64(buf);
}

async function aesDecrypt(b64){
  const buf=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:buf.slice(0,12)},S.aesKey,buf.slice(12));
  return new TextDecoder().decode(pt);
}

// ===================== GITHUB API =====================
async function ghGet(path){
  const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`,{
    headers:{Authorization:`token ${S.pat}`,Accept:'application/vnd.github.v3+json'}
  });
  if(!r.ok)throw new Error(`GH GET ${path}: ${r.status}`);
  return r.json();
}
async function ghPut(path,content,msg,sha){
  const body={message:msg,content:btoa(unescape(encodeURIComponent(content))),branch:GH_BRANCH};
  if(sha)body.sha=sha;
  const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`,{
    method:'PUT',headers:{Authorization:`token ${S.pat}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!r.ok){const e=await r.json();throw new Error(e.message||`GH PUT ${r.status}`)}
  return r.json();
}
async function ghTryGet(path){try{return await ghGet(path)}catch{return null}}

// Encrypted read/write — all studio data goes through these
async function ghGetEnc(path){
  const f=await ghGet(path);
  const b64=atob(f.content.replace(/\n/g,''));
  const plain=await aesDecrypt(b64);
  return{data:JSON.parse(plain),sha:f.sha};
}
async function ghPutEnc(path,data,msg,sha){
  const plain=JSON.stringify(data,null,2);
  const enc=await aesEncrypt(plain);          // base64 string (ASCII)
  const res=await ghPut(path,enc,msg,sha);    // ghPut UTF-8-encodes it for the API
  return res;
}
async function ghTryGetEnc(path){
  try{return await ghGetEnc(path);}
  catch(e){
    if(e instanceof DOMException&&e.name==='OperationError'){
      toast('Decryption failed — this file was probably saved with a different PAT. Sign out and sign in with the correct token.','warn',10000);
    }
    return null;
  }
}

// ---- Catalogue (.enc) ----
// data/catalogue.enc  — encrypted, all presentations (studio only)
// data/catalogue.json — plain, published-only summary (public viewer)
async function loadCatalogue(){
  // Load sample/template entries from the public catalogue (always available)
  const sf=await ghTryGet('data/catalogue.json');
  const samples=sf?JSON.parse(atob(sf.content.replace(/\n/g,''))).presentations||[]:[];

  const r=await ghTryGetEnc('data/catalogue.enc');
  if(r){
    S.catSha=r.sha;
    const enc=r.data.presentations||[];
    const encSlugs=new Set(enc.map(p=>p.slug));
    // Merge: user's encrypted presentations first, then any samples not yet added
    S.presentations=[...enc,...samples.filter(s=>!encSlugs.has(s.slug))];
  }else{
    S.presentations=samples;
    S.catSha=null;
  }
}
async function saveCatalogue(){
  const res=await ghPutEnc('data/catalogue.enc',{presentations:S.presentations},'Update catalogue',S.catSha);
  S.catSha=res.content.sha;
  // Also update the plain public catalogue (published only, no draft/sensitive data)
  await updatePublicCatalogue();
}
async function updatePublicCatalogue(){
  const userSlugs=new Set(S.presentations.map(p=>p.slug));
  const pub=S.presentations
    .filter(p=>p.status==='published')
    .map(({slug,title,brand,status,visible_from,expires,created,updated,slides_count})=>({slug,title,brand,status,visible_from,expires,created,updated,slides_count}));
  const existing=await ghTryGet('data/catalogue.json');
  // Preserve sample entries not managed by the user's encrypted catalogue
  const existingData=existing?JSON.parse(atob(existing.content.replace(/\n/g,''))):null;
  const samples=(existingData?.presentations||[]).filter(p=>!userSlugs.has(p.slug));
  await ghPut('data/catalogue.json',JSON.stringify({presentations:[...pub,...samples]},null,2),'Update public catalogue',existing?.sha);
}

// ---- Presentation (.enc) ----
// Falls back to plain .json for presentations saved before encryption was added.
async function loadPresJSON(slug){
  const enc=await ghTryGetEnc(`data/presentations/${slug}.enc`);
  if(enc){enc.data._sha=enc.sha;return enc.data;}
  const f=await ghTryGet(`data/presentations/${slug}.json`);
  if(f){
    const d=JSON.parse(atob(f.content.replace(/\n/g,'')));
    d._sha=null;d._legacySha=f.sha;d._legacyPath=`data/presentations/${slug}.json`;
    if(d.slides?.length>0&&d.slides[0].html!==undefined&&!d.slides[0].fabricJson)d._isLegacyV1=true;
    return d;
  }
  // File not found — open fresh so the editor can work; saves on first Ctrl+S
  const meta=S.presentations.find(p=>p.slug===slug)||{};
  toast(`No data file for "${slug}" — opening blank presentation`,'warn',5000);
  return{slug,title:meta.title||slug,brand:meta.brand||'all',status:meta.status||'draft',
    description:meta.description||'',visible_from:meta.visible_from||null,expires:meta.expires||null,
    created:meta.created||new Date().toISOString(),updated:new Date().toISOString(),
    slides:[{id:uuid(),fabricJson:blankSlideJson(),bg:'#ffffff',thumbnail:null,notes:''}],_sha:null};
}
async function savePresJSON(pres){
  const{_sha,_legacySha,_legacyPath,_isLegacyV1,...data}=pres;
  const res=await ghPutEnc(`data/presentations/${pres.slug}.enc`,data,`Save: ${pres.title}`,_sha||undefined);
  pres._sha=res.content.sha;
  // If this was a legacy .json file, delete it now that we've migrated to .enc
  if(_legacyPath&&_legacySha){
    try{
      await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${_legacyPath}`,{
        method:'DELETE',
        headers:{Authorization:`token ${S.pat}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
        body:JSON.stringify({message:`Migrate to encrypted: ${pres.slug}`,sha:_legacySha,branch:GH_BRANCH})
      });
    }catch{}
  }
}

// ===================== AUTH VIEW =====================
function mountAuth(){
  S.view='auth';
  setTheme(S.theme);
  document.getElementById('app').innerHTML=`
  <div id="auth-view">
    <div class="auth-card">
      <div class="auth-left">
        <div class="auth-brand">Phyto Studio</div>
        <div class="auth-desc">AI-powered marketing content studio for Phyto Evolution brands. Build catalogues, presentations and more — published directly to your websites.</div>
        <div class="auth-sites">
          <div class="auth-site"><span class="auth-site-dot"></span>phytolabs.in — Plant Tissue Culture Lab</div>
          <div class="auth-site"><span class="auth-site-dot"></span>tcplants.in — TC Plant Nursery</div>
          <div class="auth-site"><span class="auth-site-dot"></span>carnivorousplants.in — CP Retail Shop</div>
        </div>
      </div>

async function handleAuth(){
  const pat=document.getElementById('pat-inp').value.trim();
  const err=document.getElementById('auth-err');
  if(!pat){err.textContent='PAT required';return;}
  err.textContent='Checking…';
  try{
    const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}`,{headers:{Authorization:`token ${pat}`}});
    if(!r.ok){err.textContent='Invalid PAT or no repo access';return;}
    err.textContent='Loading…';
    S.aesKey=await deriveKey(pat);
    S.pat=pat;sessionStorage.setItem('ps_pat',pat);
    err.textContent='';
    await mountDashboard();
  }catch(e){err.textContent='Error: '+e.message;}
}

function timeAgo(iso){
  if(!iso)return'';
  const d=new Date(iso),now=Date.now(),diff=now-d.getTime();
  const m=Math.floor(diff/60000),h=Math.floor(diff/3600000),dy=Math.floor(diff/86400000);
  if(m<2)return'just now';
  if(m<60)return m+'m ago';
  if(h<24)return h+'h ago';
  if(dy<7)return dy+'d ago';
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}

function statusMeta(p){
  const now=new Date();
  if(p.status==='archived')return{label:'Archived',cls:'pip-archived'};
  if(p.status==='draft')return{label:'Draft',cls:'pip-draft'};
  if(p.expires&&new Date(p.expires)<now)return{label:'Expired',cls:'pip-expired'};
  if(p.visible_from&&new Date(p.visible_from)>now)return{label:'Scheduled',cls:'pip-scheduled'};
  if(p.status==='published')return{label:'Published',cls:'pip-published'};
  return{label:'Draft',cls:'pip-draft'};
}

async function createPresentation(withAI=false){
  const title=document.getElementById('np-title')?.value.trim();
  const slugRaw=document.getElementById('np-slug')?.value.trim();
  const brand=document.getElementById('np-brand')?.value;
  const status=document.getElementById('np-vis')?.value||'draft';
  const vf=document.getElementById('np-from')?.value||null;
  const exp=document.getElementById('np-exp')?.value||null;
  const desc=document.getElementById('np-desc')?.value.trim()||'';
  const brief=document.getElementById('np-brief')?.value.trim()||'';
  if(!title){toast('Title required','err');return;}
  const slug=slugify(slugRaw||title);
  if(S.presentations.find(p=>p.slug===slug)){toast('Slug already exists','err');return;}
  const now=new Date().toISOString();
  const pres={slug,title,brand:brand||'all',status,description:desc,visible_from:vf||null,expires:exp||null,created:now,updated:now,slides_count:1,_sha:null};
  const presData={...pres,slides:[{id:uuid(),fabricJson:blankSlideJson(),bg:'#ffffff',thumbnail:null,notes:''}]};
  const btn=document.querySelector('#new-pres-overlay .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Creating…';}
  try{
    await savePresJSON(presData);
    S.presentations.push({slug,title,brand:brand||'all',status,description:desc,visible_from:vf||null,expires:exp||null,created:now,updated:now,slides_count:1});
    await saveCatalogue();
    document.getElementById('new-pres-overlay')?.remove();
    toast('Created!','ok');
    if(withAI&&brief){S._pendingAiBrief=brief;}
    openEditor(slug);
  }catch(e){toast('Error: '+e.message,'err');if(btn){btn.disabled=false;btn.textContent='Create →';}}
}

// ===================== FABRIC CANVAS =====================
function initFabric(){
  if(S.fc){S.fc.dispose();}
  const fc=new fabric.Canvas('fc',{
    width:SLIDE_W,height:SLIDE_H,
    backgroundColor:'#ffffff',
    preserveObjectStacking:true,
    selectionColor:'rgba(26,107,85,0.08)',
    selectionBorderColor:'#1a6b55',
    selectionLineWidth:1.5,
  });
  S.fc=fc;

  fc.on('object:modified',onCanvasChange);
  fc.on('object:added',onCanvasChange);
  fc.on('object:removed',onCanvasChange);
  fc.on('selection:created',updatePropsPanel);
  fc.on('selection:updated',updatePropsPanel);
  fc.on('selection:cleared',()=>{clearPropsPanel();updateToolbar()});
  fc.on('mouse:down',onMouseDown);
  fc.on('mouse:move',onMouseMove);
  fc.on('mouse:up',onMouseUp);

  requestAnimationFrame(()=>fitCanvas());

  const ro=new ResizeObserver(fitCanvas);
  const area=document.getElementById('canvas-area');
  if(area)ro.observe(area);
}

function fitCanvas(){
  if(!S.fc)return;
  const area=document.getElementById('canvas-area');
  if(!area)return;
  const aw=area.clientWidth-60,ah=area.clientHeight-60;
  const z=Math.min(aw/SLIDE_W,ah/SLIDE_H,1.5);
  S.zoom=z;
  S.fc.setZoom(z);
  S.fc.setWidth(SLIDE_W*z);
  S.fc.setHeight(SLIDE_H*z);
  const lbl=document.getElementById('zoom-lbl');
  if(lbl)lbl.textContent=Math.round(z*100)+'%';
}

function changeZoom(delta){
  if(!S.fc)return;
  const z=clamp(S.zoom+delta,0.1,3);
  S.zoom=z;
  S.fc.setZoom(z);
  S.fc.setWidth(SLIDE_W*z);
  S.fc.setHeight(SLIDE_H*z);
  const lbl=document.getElementById('zoom-lbl');
  if(lbl)lbl.textContent=Math.round(z*100)+'%';
}

// ===================== TOOLS =====================
function setTool(t){
  S.tool=t;
  S.isDrawing=false;S.drawStart=null;
  if(S.drawObj){S.fc.remove(S.drawObj);S.drawObj=null;}
  document.querySelectorAll('[id^="tool-"]').forEach(b=>b.classList.remove('active'));
  const active=document.getElementById('tool-'+t);
  if(active)active.classList.add('active');
  if(S.fc){
    S.fc.defaultCursor=t==='text'?'text':t==='select'?'default':'crosshair';
    S.fc.selection=t==='select';
    S.fc.forEachObject(o=>o.selectable=t==='select');
    S.fc.renderAll();
  }
  document.getElementById('shape-picker')?.classList.remove('open');
}

function toggleShapePicker(){
  const p=document.getElementById('shape-picker');
  if(p)p.classList.toggle('open');
}

function insertShape(type){
  if(!S.fc)return;
  const cx=SLIDE_W/2,cy=SLIDE_H/2;
  const fill=BRAND_COLORS[S.current?.brand]||'#4285f4';
  let obj;
  if(type==='rect')obj=new fabric.Rect({left:cx-100,top:cy-60,width:200,height:120,fill,rx:0,ry:0});
  else if(type==='roundrect')obj=new fabric.Rect({left:cx-100,top:cy-60,width:200,height:120,fill,rx:12,ry:12});
  else if(type==='circle')obj=new fabric.Ellipse({left:cx-80,top:cy-80,rx:80,ry:80,fill});
  else if(type==='triangle')obj=new fabric.Triangle({left:cx-90,top:cy-80,width:180,height:160,fill});
  else if(type==='star')obj=createStar(cx,cy,5,90,45,fill);
  else if(type==='arrow')obj=new fabric.Triangle({left:cx-30,top:cy-60,width:60,height:80,fill,angle:0});
  else if(type==='line')obj=new fabric.Line([cx-100,cy,cx+100,cy],{stroke:'#333',strokeWidth:3,selectable:true});
  else if(type==='diamond'){
    const pts=[{x:0,y:-80},{x:70,y:0},{x:0,y:80},{x:-70,y:0}];
    obj=new fabric.Polygon(pts,{left:cx,top:cy,fill,originX:'center',originY:'center'});
  }
  if(!obj)return;
  S.fc.add(obj);S.fc.setActiveObject(obj);S.fc.renderAll();
  setTool('select');
  document.getElementById('shape-picker')?.classList.remove('open');
  pushHistory();
}

function createStar(cx,cy,pts,outerR,innerR,fill){
  const path=[];
  for(let i=0;i<pts*2;i++){
    const angle=(i*Math.PI/pts)-(Math.PI/2);
    const r=i%2===0?outerR:innerR;
    const x=cx+r*Math.cos(angle),y=cy+r*Math.sin(angle);
    path.push((i===0?'M':'L')+x+' '+y);
  }
  path.push('Z');
  return new fabric.Path(path.join(' '),{fill,left:cx-outerR,top:cy-outerR,originX:'left',originY:'top'});
}

function onMouseDown(opt){
  if(S.tool==='select')return;
  const p=S.fc.getPointer(opt.e);
  if(S.tool==='text'){
    const tb=new fabric.Textbox('Text',{left:p.x,top:p.y,width:200,fontSize:24,fontFamily:'Plus Jakarta Sans',fill:'#1a1a1a',editable:true});
    S.fc.add(tb);S.fc.setActiveObject(tb);tb.enterEditing();tb.selectAll();S.fc.renderAll();
    setTool('select');pushHistory();return;
  }
  if(['rect','roundrect','circle','triangle','line','diamond'].includes(S.tool)){
    S.isDrawing=true;S.drawStart={x:p.x,y:p.y};
  }
}

function onMouseMove(opt){
  if(!S.isDrawing||!S.drawStart)return;
  const p=S.fc.getPointer(opt.e);
  if(S.drawObj)S.fc.remove(S.drawObj);
  const x=Math.min(S.drawStart.x,p.x),y=Math.min(S.drawStart.y,p.y);
  const w=Math.abs(p.x-S.drawStart.x)||2,h=Math.abs(p.y-S.drawStart.y)||2;
  const fill=BRAND_COLORS[S.current?.brand]||'#4285f4';
  let obj;
  if(S.tool==='rect')obj=new fabric.Rect({left:x,top:y,width:w,height:h,fill,selectable:false});
  else if(S.tool==='roundrect')obj=new fabric.Rect({left:x,top:y,width:w,height:h,fill,rx:10,ry:10,selectable:false});
  else if(S.tool==='circle')obj=new fabric.Ellipse({left:x,top:y,rx:w/2,ry:h/2,fill,selectable:false});
  else if(S.tool==='triangle')obj=new fabric.Triangle({left:x,top:y,width:w,height:h,fill,selectable:false});
  else if(S.tool==='line')obj=new fabric.Line([S.drawStart.x,S.drawStart.y,p.x,p.y],{stroke:'#333',strokeWidth:3,selectable:false});
  if(obj){S.fc.add(obj);S.drawObj=obj;S.fc.renderAll();}
}

function onMouseUp(opt){
  if(!S.isDrawing)return;
  S.isDrawing=false;
  if(S.drawObj){
    S.drawObj.set('selectable',true);
    S.fc.setActiveObject(S.drawObj);
    S.drawObj=null;
  }
  S.drawStart=null;
  setTool('select');
  pushHistory();
}

function promptImage(){
  const url=prompt('Image URL (or paste a web URL):','https://');
  if(!url||url==='https://')return;
  fabric.Image.fromURL(url,(img)=>{
    if(!img){toast('Could not load image','err');return;}
    const scale=Math.min(400/img.width,300/img.height,1);
    img.set({left:SLIDE_W/2-img.width*scale/2,top:SLIDE_H/2-img.height*scale/2,scaleX:scale,scaleY:scale});
    S.fc.add(img);S.fc.setActiveObject(img);S.fc.renderAll();
    setTool('select');pushHistory();
  },{crossOrigin:'anonymous'});
}

// ===================== HISTORY =====================
function pushHistory(){
  if(!S.fc)return;
  const state=JSON.stringify(S.fc.toJSON());
  S.hist=S.hist.slice(0,S.histIdx+1);
  S.hist.push(state);
  if(S.hist.length>50)S.hist.shift();else S.histIdx++;
  setDirty(true);
  updateThumbDebounced();
  autoSave();
}

function doUndo(){
  if(!S.fc||S.histIdx<=0)return;
  S.histIdx--;
  _suppressHistory=true;
  S.fc.loadFromJSON(S.hist[S.histIdx],()=>{_suppressHistory=false;S.fc.renderAll();clearPropsPanel();updateThumb();});
  setDirty(true);
}

function doRedo(){
  if(!S.fc||S.histIdx>=S.hist.length-1)return;
  S.histIdx++;
  _suppressHistory=true;
  S.fc.loadFromJSON(S.hist[S.histIdx],()=>{_suppressHistory=false;S.fc.renderAll();clearPropsPanel();updateThumb();});
  setDirty(true);
}

const onCanvasChange=debounce(()=>{if(!_suppressHistory){pushHistory();updatePropsPanel();updateToolbar();}},80);

// ===================== SLIDE MANAGEMENT =====================
function renderSlidePanel(){
  const list=document.getElementById('slide-list');
  if(!list)return;
  list.innerHTML=S.slides.map((sl,i)=>`
    <div class="slide-item${i===S.curSlide?' active':''}" data-index="${i}"
      draggable="true"
      ondragstart="slideDragStart(event,${i})"
      ondragover="slideDragOver(event,${i})"
      ondrop="slideDrop(event,${i})"
      onclick="switchSlide(${i})"
      oncontextmenu="slideCtxMenu(event,${i})">
      <div class="slide-num">${i+1}</div>
      <div class="slide-thumb-wrap">
        ${sl.thumbnail?`<img src="${sl.thumbnail}" alt="Slide ${i+1}">`:'<div class="slide-empty-thumb"></div>'}
      </div>
    </div>`).join('');
}

let dragFrom=null;
function slideDragStart(e,i){dragFrom=i;e.dataTransfer.effectAllowed='move';}
function slideDragOver(e,i){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.slide-item').forEach((el,idx)=>el.classList.toggle('drag-over',idx===i&&i!==dragFrom));
}
function slideDrop(e,i){
  e.preventDefault();
  document.querySelectorAll('.slide-item').forEach(el=>el.classList.remove('drag-over'));
  if(dragFrom===null||dragFrom===i)return;
  const sl=S.slides.splice(dragFrom,1)[0];
  S.slides.splice(i,0,sl);
  S.curSlide=i;
  renderSlidePanel();
  loadSlide(i);
  setDirty(true);
}

function switchSlide(i){
  if(i===S.curSlide)return;
  saveCurSlide();
  loadSlide(i);
}

function saveCurSlide(){
  if(!S.fc)return;
  const s=S.slides[S.curSlide];
  s.fabricJson=S.fc.toJSON();
  s.bg=S.fc.backgroundColor||'#ffffff';
  s.notes=document.getElementById('notes-ta')?.value||'';
}

function loadSlide(i){
  if(!S.fc)return;
  S.curSlide=i;
  const sl=S.slides[i];
  S.hist=[];S.histIdx=-1;
  S.fc.loadFromJSON(sl.fabricJson||blankSlideJson(),()=>{
    S.fc.setBackgroundColor(sl.bg||'#ffffff',()=>{S.fc.renderAll();updateThumb();});
    pushHistory();
    clearPropsPanel();
    updateToolbar();
  });
  const ta=document.getElementById('notes-ta');
  if(ta)ta.value=sl.notes||'';
  renderSlidePanel();
}

function addSlide(afterIdx){
  saveCurSlide();
  const idx=afterIdx!==undefined?afterIdx+1:S.slides.length;
  S.slides.splice(idx,0,{id:uuid(),fabricJson:blankSlideJson(),bg:'#ffffff',thumbnail:null,notes:''});
  S.curSlide=idx;
  renderSlidePanel();
  loadSlide(idx);
  setDirty(true);
}

function dupeCurSlide(){
  saveCurSlide();
  const copy=JSON.parse(JSON.stringify(S.slides[S.curSlide]));
  copy.id=uuid();
  S.slides.splice(S.curSlide+1,0,copy);
  S.curSlide=S.curSlide+1;
  renderSlidePanel();
  loadSlide(S.curSlide);
  setDirty(true);
}

function deleteSlideAt(i){
  if(S.slides.length<=1){toast('Cannot delete the only slide','err');return;}
  S.slides.splice(i,1);
  S.curSlide=Math.min(S.curSlide,S.slides.length-1);
  renderSlidePanel();
  loadSlide(S.curSlide);
  setDirty(true);
}

function updateThumb(){
  if(!S.fc)return;
  const z=S.fc.getZoom();
  const mult=(SLIDE_W*0.18)/(SLIDE_W*z);
  const thumb=S.fc.toDataURL({format:'jpeg',quality:0.7,multiplier:mult});
  S.slides[S.curSlide].thumbnail=thumb;
  const img=document.querySelector(`.slide-item[data-index="${S.curSlide}"] .slide-thumb-wrap img`);
  if(img){img.src=thumb;}
  else{
    const wrap=document.querySelector(`.slide-item[data-index="${S.curSlide}"] .slide-thumb-wrap`);
    if(wrap)wrap.innerHTML=`<img src="${thumb}" alt="">`;
  }
}

const updateThumbDebounced=debounce(updateThumb,600);
const pushHistoryDebounced=debounce(pushHistory,300);

function saveNotes(){S.slides[S.curSlide].notes=document.getElementById('notes-ta')?.value||'';}
function toggleNotes(){
  S.notesOpen=!S.notesOpen;
  const p=document.getElementById('notes-panel');
  if(p){p.className=S.notesOpen?'expanded':'collapsed';}
  const arr=document.getElementById('notes-arrow');
  if(arr)arr.textContent=S.notesOpen?'▼':'▶';
}

function slideCtxMenu(e,i){
  e.preventDefault();
  showCtxMenu(e.clientX,e.clientY,[
    {label:'Duplicate Slide',fn:()=>{saveCurSlide();const copy=JSON.parse(JSON.stringify(S.slides[i]));copy.id=uuid();S.slides.splice(i+1,0,copy);S.curSlide=i+1;renderSlidePanel();loadSlide(i+1);setDirty(true);}},
    {label:'Add Slide After',fn:()=>addSlide(i)},
    {sep:true},

    {sep:true},

  ]);
}

function pickSlideBg(){
  const hc=document.getElementById('hidden-color');
  hc.value=S.fc?.backgroundColor||'#ffffff';
  hc.onchange=e=>{S.fc?.setBackgroundColor(e.target.value,()=>S.fc.renderAll());pushHistory();};
  hc.click();
}

// ===================== OBJECT MANIPULATION =====================
function doDelete(){
  const obj=S.fc?.getActiveObject();
  if(!obj)return;
  if(obj.type==='activeSelection'){obj.getObjects().forEach(o=>S.fc.remove(o));S.fc.discardActiveObject();}
  else S.fc.remove(obj);
  S.fc.renderAll();pushHistory();clearPropsPanel();
}

function doCopy(){
  const obj=S.fc?.getActiveObject();
  if(!obj)return;
  obj.clone(cl=>{S.clip=cl;});
}

function doPaste(){
  if(!S.clip||!S.fc)return;
  S.clip.clone(cl=>{
    cl.set({left:(cl.left||0)+20,top:(cl.top||0)+20,evented:true});
    if(cl.type==='activeSelection'){cl.canvas=S.fc;cl.getObjects().forEach(o=>S.fc.add(o));S.fc.setActiveObject(cl);}
    else{S.fc.add(cl);S.fc.setActiveObject(cl);}
    S.fc.renderAll();S.clip=cl;pushHistory();
  });
}

function doDupe(){doCopy();doPaste();}
function selectAll(){if(!S.fc)return;const objs=S.fc.getObjects();if(!objs.length)return;S.fc.setActiveObject(new fabric.ActiveSelection(objs,{canvas:S.fc}));S.fc.renderAll();}
function doLayer(dir){
  const obj=S.fc?.getActiveObject();if(!obj)return;
  if(dir==='front')obj.bringToFront();
  else if(dir==='forward')obj.bringForward();
  else if(dir==='backward')obj.sendBackwards();
  else if(dir==='back')obj.sendToBack();
  S.fc.renderAll();pushHistory();
}

function alignObj(dir){
  const obj=S.fc?.getActiveObject();if(!obj||!S.fc)return;
  const b=obj.getBoundingRect(true);
  if(dir==='left')obj.set('left',0);
  else if(dir==='hcenter')obj.set('left',(SLIDE_W-b.width)/2);
  else if(dir==='right')obj.set('left',SLIDE_W-b.width);
  else if(dir==='top')obj.set('top',0);
  else if(dir==='vcenter')obj.set('top',(SLIDE_H-b.height)/2);
  else if(dir==='bottom')obj.set('top',SLIDE_H-b.height);
  obj.setCoords();S.fc.renderAll();pushHistory();
}

function flipH(){const obj=S.fc?.getActiveObject();if(obj){obj.set('flipX',!obj.flipX);S.fc.renderAll();pushHistory();}}
function flipV(){const obj=S.fc?.getActiveObject();if(obj){obj.set('flipY',!obj.flipY);S.fc.renderAll();pushHistory();}}

function doGroup(){
  if(!S.fc)return;
  const sel=S.fc.getActiveObject();
  if(!sel||sel.type!=='activeSelection')return;
  sel.toGroup();S.fc.requestRenderAll();pushHistory();
}
function doUngroup(){
  if(!S.fc)return;
  const sel=S.fc.getActiveObject();
  if(!sel||sel.type!=='group')return;
  sel.toActiveSelection();S.fc.requestRenderAll();pushHistory();
}

// ===================== TEXT FORMATTING =====================
function isTextObj(o){return o&&(o.type==='i-text'||o.type==='textbox');}
function toggleBold(){
  const o=S.fc?.getActiveObject();if(!isTextObj(o))return;
  o.set('fontWeight',o.fontWeight==='bold'?'normal':'bold');
  S.fc.renderAll();updateToolbar();pushHistory();
}
function toggleItalic(){
  const o=S.fc?.getActiveObject();if(!isTextObj(o))return;
  o.set('fontStyle',o.fontStyle==='italic'?'normal':'italic');
  S.fc.renderAll();updateToolbar();pushHistory();
}
function toggleUnderline(){
  const o=S.fc?.getActiveObject();if(!isTextObj(o))return;
  o.set('underline',!o.underline);
  S.fc.renderAll();updateToolbar();pushHistory();
}
function applyFont(f){
  const o=S.fc?.getActiveObject();if(!o)return;
  o.set('fontFamily',f);S.fc.renderAll();pushHistory();
  setFontPickerValue(f);closeFontPicker();
}
function applyFontSize(v){
  const o=S.fc?.getActiveObject();if(!isTextObj(o))return;

}

// ===================== COLOR PICKER =====================
function pickColor(target){
  const hc=document.getElementById('hidden-color');
  const obj=S.fc?.getActiveObject();
  if(target==='fill')hc.value=toHex(obj?.fill||'#4285f4');
  else if(target==='textFill')hc.value=toHex(obj?.fill||'#000000');
  else if(target==='stroke')hc.value=toHex(obj?.stroke||'#000000');
  hc.onchange=e=>{applyColor(target,e.target.value);};
  hc.click();
}

function applyColor(target,val){
  const obj=S.fc?.getActiveObject();
  if(!obj){
    if(target==='slideBg'){S.fc?.setBackgroundColor(val,()=>S.fc.renderAll());pushHistory();}
    return;
  }
  if(target==='textFill'&&isTextObj(obj))obj.set('fill',val);
  else if(target==='fill')obj.set('fill',val);
  else if(target==='stroke')obj.set('stroke',val);
  S.fc.renderAll();
  updateSwatches(obj);
  pushHistory();
}

function toHex(c){
  if(!c||typeof c!=='string')return'#000000';
  if(c.startsWith('#'))return c;
  if(_toHexCtx){_toHexCtx.fillStyle=c;return _toHexCtx.fillStyle;}
  return'#000000';
}

function updateSwatches(obj){
  if(!obj)return;
  const fb=document.getElementById('fill-bar'),tb=document.getElementById('text-bar'),sb=document.getElementById('stroke-bar');
  if(fb)fb.style.background=obj.fill||'transparent';
  if(tb)tb.style.background=isTextObj(obj)?obj.fill||'#000':'#000';
  if(sb)sb.style.background=obj.stroke||'transparent';
}

// ===================== FONT PICKER =====================
function toggleFontPicker(e){
  e.stopPropagation();
  const dd=document.getElementById('tb-font-dropdown');if(!dd)return;
  const isOpen=dd.classList.toggle('open');
  if(isOpen){
    const sf=document.getElementById('tb-font-search');
    if(sf){sf.value='';sf.focus();}
    filterFonts('');
    const obj=S.fc?.getActiveObject();
    const cur=isTextObj(obj)?obj.fontFamily:'Plus Jakarta Sans';
    document.querySelectorAll('.tb-font-item').forEach(el=>{
      el.classList.toggle('active',el.dataset.font===cur);
      if(el.dataset.font===cur)el.scrollIntoView({block:'nearest'});
    });
    setTimeout(()=>document.addEventListener('click',closeFontPicker,{once:true}),10);
  }
}
function closeFontPicker(){document.getElementById('tb-font-dropdown')?.classList.remove('open');}
function filterFonts(q){
  const lq=q.toLowerCase();
  document.querySelectorAll('.tb-font-item').forEach(el=>{
    el.style.display=!lq||el.dataset.font.toLowerCase().includes(lq)?'':'none';

function setFontPickerValue(f){

  if(d){d.textContent=f;d.style.fontFamily=`'${f}',sans-serif`;}
}

// ===================== TEXT ALIGNMENT =====================
function applyTextAlign(a){

  o.set('textAlign',a);S.fc.renderAll();updateToolbar();updatePropsPanel();pushHistory();

// ===================== SHADOW =====================
function applyShadow(){
  const obj=S.fc?.getActiveObject();if(!obj?.shadow)return;
  const color=document.getElementById('pp-shadow-color')?.value||'#000000';
  const blur=parseInt(document.getElementById('pp-shadow-blur')?.value)||10;

// ===================== TOOLBAR SYNC =====================
function updateToolbar(){
  const obj=S.fc?.getActiveObject();
  const isText=isTextObj(obj);
  document.getElementById('tb-bold')?.classList.toggle('active',isText&&obj.fontWeight==='bold');
  document.getElementById('tb-italic')?.classList.toggle('active',isText&&obj.fontStyle==='italic');
  document.getElementById('tb-underline')?.classList.toggle('active',isText&&!!obj.underline);
  const alignMap={l:'left',c:'center',r:'right',j:'justify'};
  Object.entries(alignMap).forEach(([k,a])=>document.getElementById('tb-ta'+k)?.classList.toggle('active',isText&&obj.textAlign===a));
  if(isText)setFontPickerValue(obj.fontFamily||'Plus Jakarta Sans');

  if(obj)updateSwatches(obj);

function handlePropInput(e){
  const prop=e.target.dataset.prop;
  const val=e.target.value;
  const obj=S.fc?.getActiveObject();if(!obj)return;
  if(prop==='opacity'){
    obj.set('opacity',parseInt(val)/100);
    const lbl=document.getElementById('pp-opacity-lbl');
    if(lbl)lbl.textContent=val+'%';
  }else if(prop==='fill'||prop==='stroke'){
    obj.set(prop,val);
  }
  S.fc.renderAll();updateSwatches(obj);
}

function handlePropChange(e){
  const prop=e.target.dataset.prop;
  const val=e.target.value;
  const obj=S.fc?.getActiveObject();if(!obj)return;
  if(prop==='left'||prop==='top')obj.set(prop,parseFloat(val));
  else if(prop==='w'){const br=obj.getBoundingRect(true);obj.scaleToWidth(parseFloat(val));}
  else if(prop==='h'){const br=obj.getBoundingRect(true);obj.scaleToHeight(parseFloat(val));}
  else if(prop==='angle')obj.set('angle',parseFloat(val));
  else if(prop==='fontFamily'){obj.set('fontFamily',val);setFontPickerValue(val);}
  else if(prop==='fontSize')obj.set('fontSize',parseInt(val));
  else if(prop==='lineHeight')obj.set('lineHeight',parseFloat(val));
  else if(prop==='charSpacing')obj.set('charSpacing',parseInt(val));
  else if(prop==='strokeWidth')obj.set('strokeWidth',parseInt(val));
  obj.setCoords();S.fc.renderAll();pushHistory();
}

function handlePropBtn(e){
  const prop=e.currentTarget.dataset.prop;
  const val=e.currentTarget.dataset.val;
  const obj=S.fc?.getActiveObject();if(!obj)return;
  if(prop==='bold')obj.set('fontWeight',obj.fontWeight==='bold'?'normal':'bold');
  else if(prop==='italic')obj.set('fontStyle',obj.fontStyle==='italic'?'normal':'italic');
  else if(prop==='underline')obj.set('underline',!obj.underline);
  else if(prop==='linethrough')obj.set('linethrough',!obj.linethrough);
  else if(prop==='textAlign')obj.set('textAlign',val);
  S.fc.renderAll();updatePropsPanel();pushHistory();
}

function clearPropsPanel(){

  const body=document.getElementById('pp-body');
  if(hdr)hdr.textContent='Slide';
  if(body)body.innerHTML=`

      <div class="pp-section-title">Background</div>
      <div class="pp-row"><div class="pp-label">Color</div>
        <input class="pp-input" type="color" id="pp-slide-bg" value="${toHex(S.fc?.backgroundColor||'#ffffff')}">
        <button class="btn btn-ghost btn-sm" onclick="pickSlideBg()">Pick</button>
      </div>
    </div>
    <div class="pp-divider"></div>
    <div class="pp-empty">Click an object to edit its properties</div>`;
  document.getElementById('pp-slide-bg')?.addEventListener('input',e=>{
    S.fc?.setBackgroundColor(e.target.value,()=>S.fc.renderAll());
  });
  document.getElementById('pp-slide-bg')?.addEventListener('change',()=>pushHistory());
}

// ===================== CONTEXT MENU =====================
function showCtxMenu(x,y,items){
  const el=document.getElementById('ctx-menu');
  el.innerHTML=items.map(it=>{
    if(it.sep)return`<div class="ctx-sep"></div>`;
    return`<div class="ctx-item${it.danger?' danger':''}" data-fn="${it.label}">${it.label}${it.kb?`<span class="kb">${it.kb}</span>`:''}</div>`;
  }).join('');
  items.forEach(it=>{
    if(it.sep||!it.fn)return;
    el.querySelector(`[data-fn="${it.label}"]`)?.addEventListener('click',()=>{el.style.display='none';it.fn();});
  });
  el.style.display='block';el.style.left=x+'px';el.style.top=y+'px';
  setTimeout(()=>document.addEventListener('click',()=>el.style.display='none',{once:true}),10);
}

// Canvas context menu
function setupCanvasContextMenu(){
  document.getElementById('canvas-wrap')?.addEventListener('contextmenu',e=>{
    e.preventDefault();
    const obj=S.fc?.getActiveObject();
    if(!obj)return;
    const items=[

// ===================== VIEW ENCRYPTION =====================
// Each published presentation gets its own random 256-bit key.
// Slides are bundled into one data.enc file — no raw images in the repo.
// The key lives in the share URL fragment (#k=…) which is never sent to any server.

function generateViewKey(){
  return Array.from(crypto.getRandomValues(new Uint8Array(32)),b=>b.toString(16).padStart(2,'0')).join('');
}

async function encryptForView(plaintext,hexKey){
  const keyBytes=Uint8Array.from(hexKey.match(/.{2}/g),h=>parseInt(h,16));
  const ck=await crypto.subtle.importKey('raw',keyBytes,'AES-GCM',false,['encrypt']);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},ck,new TextEncoder().encode(plaintext));
  const buf=new Uint8Array(12+ct.byteLength);
  buf.set(iv,0);buf.set(new Uint8Array(ct),12);
  return _u8ToBase64(buf);
}

async function publishReveal(){
  if(!S.fc||!S.slides.length){toast('Nothing to publish','err');return;}
  toast('Rendering slides…','info',30000);
  saveCurSlide();
  try{
    const slug=S.current.slug;
    // Reuse existing key or generate new one
    if(!S.current.viewKey)S.current.viewKey=generateViewKey();
    const viewKey=S.current.viewKey;

    // Render all slides to JPEG
    const slideImgs=[];
    for(let i=0;i<S.slides.length;i++){
      toast(`Rendering slide ${i+1}/${S.slides.length}…`,'info',10000);
      slideImgs.push(await renderSlideImg(S.slides[i],1));
    }

    // Bundle + encrypt into one data.enc
    toast('Encrypting…','info',10000);
    const bundle={title:S.current.title,brand:S.current.brand,slides:slideImgs,notes:S.slides.map(s=>s.notes||'')};
    const enc=await encryptForView(JSON.stringify(bundle),viewKey);

    // Save data.enc (no raw images anywhere in repo)
    const dataPath=`view/${slug}/data.enc`;
    const exData=await ghTryGet(dataPath);
    await ghPut(dataPath,enc,`Publish data: ${S.current.title}`,exData?.sha);

    // Save viewer HTML (self-contained, key-gated)
    const html=buildViewerHtml(S.current.title,S.current.brand);
    const exHtml=await ghTryGet(`view/${slug}/index.html`);
    await ghPut(`view/${slug}/index.html`,html,`Publish viewer: ${S.current.title}`,exHtml?.sha);

    // Update status + persist key in encrypted store
    S.current.status='published';
    S.current.slides=S.slides;
    const idx=S.presentations.findIndex(p=>p.slug===slug);
    if(idx>=0){S.presentations[idx].status='published';S.presentations[idx].viewKey=viewKey;}
    await savePresJSON(S.current);
    await saveCatalogue();

    const shareUrl=`https://shiva16.github.io/phyto-studio/view/${slug}/#k=${viewKey}`;
    navigator.clipboard?.writeText(shareUrl).catch(()=>{});
    showShareModal(shareUrl);
  }catch(e){toast('Publish error: '+e.message,'err');console.error(e);}
}

async function runAiGenerate(){
  const prompt=document.getElementById('ai-prompt')?.value.trim();

  const model=document.getElementById('ai-model')?.value||'fast';

  try{

    const brandName=brandNames[S.current?.brand]||'Phyto Evolution';
    const messages=[
      {role:'system',content:`You are a slide content generator for ${brandName}, a plant and horticulture brand. Generate slide content as a JSON object with these exact fields: "title" (string, max 60 chars), "subtitle" (string, max 100 chars, optional), "bullets" (array of 2-5 strings, max 80 chars each), "notes" (string, speaker notes, optional). Return ONLY valid JSON, no markdown fences, no explanation.`},
      {role:'user',content:prompt}
    ];
    const content=await callWorker(messages,model);

  Object.assign(S.current,{title,brand,status,visible_from:vf||null,expires:exp||null,updated:new Date().toISOString()});
  const edTitle=document.getElementById('ed-title');
  if(edTitle)edTitle.value=title;
  const idx=S.presentations.findIndex(p=>p.slug===S.current.slug);
  if(idx>=0)Object.assign(S.presentations[idx],{title,brand,status,visible_from:vf||null,expires:exp||null,updated:S.current.updated});
  document.getElementById('pres-settings-overlay')?.remove();
  const badge=document.getElementById('save-badge');
  if(badge)badge.textContent='Saving…';
  S.saving=true;
  const wasDirty=S.dirty;
  try{
    saveCurSlide(); // capture current canvas state
    S.current.slides=S.slides;
    await savePresJSON(S.current);
    await saveCatalogue();
    setDirty(false);
    toast('Settings saved','ok');
  }catch(e){
    toast('Save failed: '+e.message,'err');
    setDirty(wasDirty);
  }
  S.saving=false;
}

async function deletePresentation(){
  if(!S.current)return;
  if(!confirm(`Delete "${S.current.title}"?\n\nThis removes it from the catalogue. The encrypted file remains in the repo — delete it manually if needed.`))return;
  document.getElementById('pres-settings-overlay')?.remove();
  try{
    S.presentations=S.presentations.filter(p=>p.slug!==S.current.slug);
    await saveCatalogue();
    toast('Deleted from catalogue','ok');
    S.dirty=false;
    backToDash();
  }catch(e){toast('Delete failed: '+e.message,'err');}
}

// ===================== KEYBOARD SHORTCUTS =====================
function isTyping(){
  const ae=document.activeElement;
  if(S.fc?.getActiveObject()?.isEditing)return true;
  return ae?.tagName==='INPUT'||ae?.tagName==='TEXTAREA'||ae?.isContentEditable;
}

document.addEventListener('keydown',e=>{
  const ctrl=e.ctrlKey||e.metaKey;
  if(S.view!=='editor')return;

  if(ctrl){
    if(e.key==='s'){e.preventDefault();saveAll();return;}
    if(isTyping())return;
    if(e.key==='z'){e.preventDefault();e.shiftKey?doRedo():doUndo();return;}
    if(e.key==='y'){e.preventDefault();doRedo();return;}
    if(e.key==='c'){e.preventDefault();doCopy();return;}
    if(e.key==='v'){e.preventDefault();doPaste();return;}
    if(e.key==='d'){e.preventDefault();doDupe();return;}
    if(e.key==='a'){e.preventDefault();selectAll();return;}
    if(e.key==='b'){e.preventDefault();toggleBold();return;}
    if(e.key==='i'){e.preventDefault();toggleItalic();return;}
    if(e.key==='u'){e.preventDefault();toggleUnderline();return;}
    if(e.key==='g'){e.preventDefault();e.shiftKey?doUngroup():doGroup();return;}
    if(e.key==='m'){e.preventDefault();addSlide();return;}
  }
  if(e.key==='PageUp'){e.preventDefault();if(S.curSlide>0)switchSlide(S.curSlide-1);return;}
  if(e.key==='PageDown'){e.preventDefault();if(S.curSlide<S.slides.length-1)switchSlide(S.curSlide+1);return;}
  if(e.key==='?'&&!isTyping()){openHelpPanel('shortcuts');return;}
  if(isTyping())return;
  if(e.key==='Delete'||e.key==='Backspace'){e.preventDefault();doDelete();return;}
  if(e.key==='Escape'){
    if(document.getElementById('preview-overlay')){document.getElementById('preview-overlay').remove();return;}
    S.fc?.discardActiveObject();S.fc?.renderAll();setTool('select');return;
  }
  if(e.key==='v'||e.key==='V'){setTool('select');return;}
  if(e.key==='t'||e.key==='T'){setTool('text');return;}
  // Arrow keys for nudging
  const obj=S.fc?.getActiveObject();
  if(obj&&['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)){
    e.preventDefault();
    const d=e.shiftKey?10:1;
    if(e.key==='ArrowLeft')obj.set('left',(obj.left||0)-d);
    if(e.key==='ArrowRight')obj.set('left',(obj.left||0)+d);
    if(e.key==='ArrowUp')obj.set('top',(obj.top||0)-d);
    if(e.key==='ArrowDown')obj.set('top',(obj.top||0)+d);
    obj.setCoords();S.fc.renderAll();
    pushHistoryDebounced();
  }
});

async function saveCardMeta(slug){
  const p=S.presentations.find(pr=>pr.slug===slug);
  if(!p){toast('Not found','err');return;}
  const title=document.getElementById('ci-title')?.value.trim();
  const brand=document.getElementById('ci-brand')?.value;
  const status=document.getElementById('ci-status')?.value;
  const desc=document.getElementById('ci-desc')?.value.trim()||'';
  const vf=document.getElementById('ci-from')?.value||null;
  const exp=document.getElementById('ci-exp')?.value||null;
  if(!title){toast('Title is required','err');return;}
  const btn=document.querySelector('#card-info-overlay .btn-secondary');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  Object.assign(p,{title,brand,status,description:desc,visible_from:vf||null,expires:exp||null,updated:new Date().toISOString()});
  try{
    await saveCatalogue();
    toast('Metadata saved','ok');
    document.getElementById('card-info-overlay')?.remove();
    renderBrandTabs();
    renderDashGrid(S.presentations);
  }catch(e){
    toast('Save failed: '+e.message,'err');
    if(btn){btn.disabled=false;btn.textContent='Save Metadata';}
  }
}

async function deleteFromDash(slug){

function closeHelpPanel(){
  const el=document.getElementById('help-overlay');
  if(!el)return;
  document.removeEventListener('keydown',el._esc);
  el.remove();
}

function showHelpSection(sec){
  document.querySelectorAll('.help-nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.sec===sec));
  document.querySelectorAll('.help-section').forEach(s=>s.classList.toggle('on',s.dataset.sec===sec));
  document.querySelectorAll('.hcard').forEach(c=>c.style.display='');
  document.getElementById('help-no-results')?.classList.remove('on');
  document.getElementById('help-search-inp').value='';
  document.getElementById('help-content')?.scrollTo(0,0);
}

function helpSearch(q){
  const lq=q.toLowerCase().trim();
  if(!lq){
    const active=document.querySelector('.help-nav-btn.active');
    showHelpSection(active?.dataset.sec||'start');
    return;
  }
  document.querySelectorAll('.help-section').forEach(s=>s.classList.add('on'));
  document.querySelectorAll('.hcard').forEach(c=>{
    const hay=(c.dataset.tags||'')+' '+c.textContent.toLowerCase();
    c.style.display=hay.includes(lq)?'':'none';
  });
  document.querySelectorAll('.help-section').forEach(s=>{
    const hasVis=[...s.querySelectorAll('.hcard')].some(c=>c.style.display!=='none');
    s.classList.toggle('on',hasVis);
  });
  const total=document.querySelectorAll('.hcard[style*="display: none"]').length;
  const all=document.querySelectorAll('.hcard').length;
  document.getElementById('help-no-results')?.classList.toggle('on',total===all);
}

let _pvIdx=0;

async function openPresPreview(slug){
  toast('Loading…','info',5000);
  let data;
  try{data=await loadPresJSON(slug);}
  catch(e){toast('Load failed: '+e.message,'err');return;}
  const slides=data.slides||[];
  if(!slides.length){toast('No slides to preview','err');return;}

  document.getElementById('preview-overlay')?.remove();
  const el=document.createElement('div');
  el.id='preview-overlay';
  el.style.cssText='position:fixed;inset:0;background:#111;z-index:20000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px';
  el.innerHTML=`
    <div style="position:absolute;top:0;left:0;right:0;height:46px;background:rgba(0,0,0,.5);display:flex;align-items:center;padding:0 16px;gap:12px">
      <span style="font-size:13px;font-weight:600;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(data.title||slug)}</span>
      <span id="pv-counter" style="font-size:12px;color:rgba(255,255,255,.5)">Rendering…</span>
      <button onclick="document.getElementById('preview-overlay').remove()" style="background:rgba(255,255,255,.12);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center">✕</button>
    </div>
    <div id="pv-slide" style="margin-top:46px;display:flex;align-items:center;justify-content:center;flex:1;width:100%">
      <div style="color:rgba(255,255,255,.35);font-size:13px">Rendering slides…</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;padding-bottom:20px">
      <button onclick="pvNav(-1)" style="background:rgba(255,255,255,.12);border:none;color:#fff;padding:8px 22px;border-radius:4px;cursor:pointer;font-size:13px;font-family:var(--font)">← Prev</button>
      <div id="pv-dots" style="display:flex;gap:6px"></div>
      <button onclick="pvNav(1)" style="background:rgba(255,255,255,.12);border:none;color:#fff;padding:8px 22px;border-radius:4px;cursor:pointer;font-size:13px;font-family:var(--font)">Next →</button>
    </div>`;
  document.body.appendChild(el);

  // Render all slides to images
  const imgs=[];
  for(let i=0;i<slides.length;i++){
    const counter=document.getElementById('pv-counter');
    if(counter)counter.textContent=`${i+1}/${slides.length}`;
    imgs.push(await renderSlideImg(slides[i],0.75));
  }

  _pvData=imgs;
  _pvIdx=0;
  pvRender();

  // Keyboard navigation within preview
  el.setAttribute('tabindex','0');
  el.focus();
  el.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft'||e.key==='ArrowUp')pvNav(-1);
    else if(e.key==='ArrowRight'||e.key==='ArrowDown')pvNav(1);
    else if(e.key==='Escape')el.remove();
  });
}

function pvRender(){
  const imgs=_pvData;
  if(!imgs)return;
  const total=imgs.length;
  const i=_pvIdx;
  const slideEl=document.getElementById('pv-slide');
  if(slideEl)slideEl.innerHTML=`<img src="${imgs[i]}" style="max-width:calc(100vw - 40px);max-height:calc(100vh - 140px);border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,.7);display:block">`;
  const counter=document.getElementById('pv-counter');
  if(counter)counter.textContent=`${i+1} / ${total}`;
  const dots=document.getElementById('pv-dots');
  if(dots)dots.innerHTML=imgs.map((_,j)=>`<div onclick="pvGoto(${j})" style="width:${j===i?18:7}px;height:7px;border-radius:4px;background:${j===i?'#fff':'rgba(255,255,255,.3)'};cursor:pointer;transition:all .15s"></div>`).join('');
}

function pvNav(dir){
  if(!_pvData)return;
  _pvIdx=Math.max(0,Math.min(_pvData.length-1,_pvIdx+dir));
  pvRender();
}

function pvGoto(i){_pvIdx=i;pvRender();}

// ===================== INIT =====================
function init(){
  setTheme(S.theme);
  if(S.pat){
    // Re-derive key from stored PAT before loading encrypted data
    deriveKey(S.pat).then(k=>{S.aesKey=k;return loadCatalogue();}).then(()=>mountDashboard()).catch(()=>mountAuth());
  }else{
    mountAuth();
  }
}

init();
</script>
</body>
</html>
