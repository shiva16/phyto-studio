name: Deploy CF Worker

on:
  push:
    branches: [main]
    paths: ['worker/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Groq proxy worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install
        working-directory: worker

      - name: Deploy worker
        run: npx wrangler deploy index.js --name studio
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.studio_cf }}
